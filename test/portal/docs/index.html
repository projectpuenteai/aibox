<!-- Standalone docs prototype page that stores content locally in the browser for testing. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Docs</title>
  <style>
    :root {
      --bg: #eef2f8;
      --panel: #ffffff;
      --line: #d4dcea;
      --text: #162335;
      --muted: #5b6779;
      --accent: #1c5ecf;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
    }

    .topbar p {
      margin: 3px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      background: #f5f8ff;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .workspace {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #f8faff;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .sidebar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .doc-list {
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .doc-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      text-align: left;
      padding: 10px;
      cursor: pointer;
      color: var(--text);
    }

    .doc-item.active {
      border-color: #9bb9ee;
      background: #ecf2ff;
    }

    .doc-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-meta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .editor-shell {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #f3f6fc;
    }

    .toolbar {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 8px;
      background: #fafcff;
    }

    .toolbar select,
    .toolbar input[type="color"] {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 4px;
      font-size: 13px;
      background: #ffffff;
      color: var(--text);
    }

    .toolbar button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 700;
      background: #f7faff;
      color: var(--text);
      cursor: pointer;
    }

    .toolbar button.danger {
      border-color: #efc8c4;
      color: var(--danger);
      background: #fff7f7;
    }

    .editor-wrap {
      padding: 18px;
      overflow: auto;
    }

    .editor {
      min-height: max(68vh, 480px);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(15, 32, 63, 0.08);
      padding: 24px;
      outline: none;
      line-height: 1.55;
      font-size: 16px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .savebar {
      border-top: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      font-size: 12px;
      padding: 9px 12px;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .doc-list {
        max-height: 220px;
      }

      .editor {
        min-height: 440px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <div>
        <h1>Docs</h1>
        <p>Signed in as <strong id="currentUser"></strong></p>
      </div>
      <div class="top-actions">
        <a class="btn" href="/ai/">AI</a>
        <a class="btn" href="/">Home</a>
        <button id="logoutBtn" class="btn primary" type="button">Log Out</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Documents</h2>
          <button id="newDocBtn" class="btn" type="button">New</button>
        </div>
        <div id="docList" class="doc-list"></div>
      </aside>

      <section class="editor-shell">
        <div class="toolbar">
          <label>
            Font
            <select id="fontFamily">
              <option value="Arial">Arial</option>
              <option value="Georgia">Georgia</option>
              <option value="Tahoma">Tahoma</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Verdana">Verdana</option>
              <option value="Courier New">Courier New</option>
            </select>
          </label>

          <label>
            Size
            <select id="fontSize">
              <option value="12">12</option>
              <option value="14">14</option>
              <option value="16" selected>16</option>
              <option value="18">18</option>
              <option value="22">22</option>
              <option value="28">28</option>
              <option value="36">36</option>
            </select>
          </label>

          <label>
            Text
            <input id="textColor" type="color" value="#1f2933" />
          </label>

          <label>
            Highlight
            <input id="highlightColor" type="color" value="#fff59d" />
          </label>

          <button type="button" data-cmd="bold">B</button>
          <button type="button" data-cmd="italic">I</button>
          <button type="button" data-cmd="underline">U</button>
          <button id="renameDocBtn" type="button">Rename</button>
          <button id="deleteDocBtn" class="danger" type="button">Delete</button>
        </div>

        <div class="editor-wrap">
          <div id="editor" class="editor" contenteditable="true" spellcheck="true"></div>
        </div>

        <div id="saveState" class="savebar">Saved.</div>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEYS = {
      accounts: "puente.accounts.v1",
      session: "puente.session.v1"
    };

    const currentUser = document.getElementById("currentUser");
    const logoutBtn = document.getElementById("logoutBtn");
    const newDocBtn = document.getElementById("newDocBtn");
    const renameDocBtn = document.getElementById("renameDocBtn");
    const deleteDocBtn = document.getElementById("deleteDocBtn");
    const docList = document.getElementById("docList");
    const editor = document.getElementById("editor");
    const saveState = document.getElementById("saveState");
    const fontFamily = document.getElementById("fontFamily");
    const fontSize = document.getElementById("fontSize");
    const textColor = document.getElementById("textColor");
    const highlightColor = document.getElementById("highlightColor");

    function safeReadJSON(key, fallbackValue) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallbackValue;
      } catch {
        return fallbackValue;
      }
    }

    function safeWriteJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function createDocument(title = "Untitled Document") {
      return {
        id: `doc-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
        title,
        content: "<p><br></p>",
        updatedAt: new Date().toISOString()
      };
    }

    function ensureAccountShape(account, username) {
      const normalized = {
        username,
        password: typeof account?.password === "string" ? account.password : "",
        createdAt: typeof account?.createdAt === "string" ? account.createdAt : new Date().toISOString(),
        aiMessages: Array.isArray(account?.aiMessages) ? account.aiMessages : [],
        documents: Array.isArray(account?.documents) ? account.documents : [],
        activeDocumentId: typeof account?.activeDocumentId === "string" ? account.activeDocumentId : ""
      };

      if (normalized.documents.length === 0) {
        const first = createDocument();
        normalized.documents = [first];
        normalized.activeDocumentId = first.id;
      }

      if (!normalized.activeDocumentId || !normalized.documents.some((doc) => doc.id === normalized.activeDocumentId)) {
        normalized.activeDocumentId = normalized.documents[0].id;
      }

      return normalized;
    }

    function loadContext() {
      const session = safeReadJSON(STORAGE_KEYS.session, null);
      if (!session || typeof session.username !== "string") {
        return null;
      }

      const accounts = safeReadJSON(STORAGE_KEYS.accounts, {});
      const rawAccount = accounts[session.username];
      if (!rawAccount) {
        return null;
      }

      const account = ensureAccountShape(rawAccount, session.username);
      accounts[session.username] = account;
      safeWriteJSON(STORAGE_KEYS.accounts, accounts);

      return { username: session.username, account, accounts };
    }

    const context = loadContext();
    if (!context) {
      location.replace("/");
      throw new Error("No active session.");
    }

    currentUser.textContent = context.username;

    let activeDocumentId = context.account.activeDocumentId;
    let saveTimer = null;

    function persistAccount() {
      context.account.activeDocumentId = activeDocumentId;
      context.accounts[context.username] = context.account;
      safeWriteJSON(STORAGE_KEYS.accounts, context.accounts);
    }

    function getDocumentById(id) {
      return context.account.documents.find((doc) => doc.id === id) || null;
    }

    function formatUpdatedAt(iso) {
      const date = new Date(iso || Date.now());
      if (Number.isNaN(date.getTime())) {
        return "recently";
      }
      return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderDocumentList() {
      docList.innerHTML = "";

      context.account.documents.forEach((doc) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `doc-item${doc.id === activeDocumentId ? " active" : ""}`;

        const title = document.createElement("p");
        title.className = "doc-title";
        title.textContent = doc.title;

        const meta = document.createElement("p");
        meta.className = "doc-meta";
        meta.textContent = `Updated ${formatUpdatedAt(doc.updatedAt)}`;

        button.appendChild(title);
        button.appendChild(meta);

        button.addEventListener("click", () => {
          if (doc.id === activeDocumentId) {
            return;
          }
          saveActiveDocument();
          activeDocumentId = doc.id;
          loadActiveDocument();
        });

        docList.appendChild(button);
      });
    }

    function loadActiveDocument() {
      const doc = getDocumentById(activeDocumentId);
      if (!doc) {
        return;
      }

      editor.innerHTML = doc.content || "<p><br></p>";
      saveState.textContent = "Saved.";
      persistAccount();
      renderDocumentList();
    }

    function saveActiveDocument(setStatusText = true) {
      const doc = getDocumentById(activeDocumentId);
      if (!doc) {
        return;
      }

      doc.content = editor.innerHTML;
      doc.updatedAt = new Date().toISOString();
      persistAccount();

      if (setStatusText) {
        saveState.textContent = `Saved ${formatUpdatedAt(doc.updatedAt)}.`;
      }

      renderDocumentList();
    }

    function queueSave() {
      saveState.textContent = "Saving...";
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => saveActiveDocument(true), 260);
    }

    function command(cmd, value = null) {
      editor.focus();
      document.execCommand("styleWithCSS", false, true);
      document.execCommand(cmd, false, value);
      queueSave();
    }

    function applyFontSize(px) {
      command("fontSize", "7");
      editor.querySelectorAll('font[size="7"]').forEach((node) => {
        node.removeAttribute("size");
        node.style.fontSize = `${px}px`;
      });
      queueSave();
    }

    function createNewDocument() {
      saveActiveDocument(false);
      const number = context.account.documents.length + 1;
      const doc = createDocument(`Document ${number}`);
      context.account.documents.unshift(doc);
      activeDocumentId = doc.id;
      persistAccount();
      loadActiveDocument();
      editor.focus();
    }

    function renameActiveDocument() {
      const doc = getDocumentById(activeDocumentId);
      if (!doc) {
        return;
      }

      const value = window.prompt("Rename document", doc.title);
      if (value === null) {
        return;
      }

      const nextTitle = value.trim();
      if (!nextTitle) {
        window.alert("Document name cannot be empty.");
        return;
      }

      doc.title = nextTitle;
      doc.updatedAt = new Date().toISOString();
      persistAccount();
      renderDocumentList();
      saveState.textContent = "Saved.";
    }

    function deleteActiveDocument() {
      if (context.account.documents.length <= 1) {
        window.alert("At least one document is required.");
        return;
      }

      const doc = getDocumentById(activeDocumentId);
      if (!doc) {
        return;
      }

      const confirmed = window.confirm(`Delete "${doc.title}"?`);
      if (!confirmed) {
        return;
      }

      context.account.documents = context.account.documents.filter((item) => item.id !== activeDocumentId);
      activeDocumentId = context.account.documents[0].id;
      persistAccount();
      loadActiveDocument();
    }

    editor.addEventListener("input", queueSave);

    fontFamily.addEventListener("change", () => command("fontName", fontFamily.value));
    fontSize.addEventListener("change", () => applyFontSize(fontSize.value));
    textColor.addEventListener("input", () => command("foreColor", textColor.value));
    highlightColor.addEventListener("input", () => command("hiliteColor", highlightColor.value));

    document.querySelectorAll("button[data-cmd]").forEach((button) => {
      button.addEventListener("click", () => command(button.dataset.cmd));
    });

    newDocBtn.addEventListener("click", createNewDocument);
    renameDocBtn.addEventListener("click", renameActiveDocument);
    deleteDocBtn.addEventListener("click", deleteActiveDocument);

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEYS.session);
      location.href = "/";
    });

    window.addEventListener("beforeunload", () => {
      saveActiveDocument(false);
    });

    loadActiveDocument();
  </script>
</body>
</html>
