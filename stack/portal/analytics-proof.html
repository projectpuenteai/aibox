<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analytics Proof</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4fb;
      --panel: #ffffff;
      --text: #14233b;
      --muted: #5c6e88;
      --line: #d6e0ec;
      --accent: #1d5fd1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "Segoe UI", Tahoma, sans-serif;
    }
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(25, 52, 94, 0.08);
      overflow: hidden;
    }
    .side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child {
      border-bottom: 0;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
    }
    .muted {
      color: var(--muted);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #edf4ff;
      color: var(--accent);
      font-weight: 700;
    }
    .status.err {
      background: #fff1f1;
      color: #bb2f2f;
    }
    .metric-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 8px;
    }
    .metric:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .metric-label {
      color: var(--muted);
      font-weight: 600;
    }
    .metric-value {
      font-weight: 700;
    }
    .frame-wrap {
      padding: 10px;
      background: linear-gradient(180deg, #dce8f7, #f3f7fd);
    }
    iframe {
      width: 100%;
      height: calc(100vh - 52px);
      border: 0;
      border-radius: 14px;
      background: #fff;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.55 Consolas, "Courier New", monospace;
      color: var(--muted);
    }
  </style>
</head>
<body data-proof-ready="false">
  <div class="layout">
    <div class="side">
      <section class="panel">
        <div class="section">
          <div class="eyebrow">Analytics Proof</div>
          <h1 class="title" id="proofLabel">Loading</h1>
          <p class="muted" id="proofMeta">Connecting to live admin console…</p>
          <div class="status" id="proofStatus">Starting</div>
        </div>
        <div class="section">
          <div class="eyebrow">Visible Metrics</div>
          <div class="metric-list" id="proofMetricsList"></div>
        </div>
        <div class="section">
          <div class="eyebrow">Daily Log</div>
          <pre id="proofDailyLog">Waiting…</pre>
        </div>
      </section>
      <section class="panel">
        <div class="section">
          <div class="eyebrow">Snapshot JSON</div>
          <pre id="proofJsonPreview">Waiting…</pre>
          <script id="proofJson" type="application/json">{}</script>
        </div>
      </section>
    </div>
    <div class="panel frame-wrap">
      <iframe id="portalFrame" src="about:blank" title="Admin Analytics"></iframe>
    </div>
  </div>

  <script>
    const APP_API = "/ai/api/v1/app";
    const params = new URLSearchParams(window.location.search);
    const label = params.get("label") || "Analytics Proof";
    const adminUsername = params.get("admin_username") || "puenteAdmin";
    const adminPassword = params.get("admin_password") || "puente123rocks";
    const dateFrom = params.get("date_from") || "";
    const dateTo = params.get("date_to") || "";
    const portalFrame = document.getElementById("portalFrame");
    const proofStatus = document.getElementById("proofStatus");
    const proofLabel = document.getElementById("proofLabel");
    const proofMeta = document.getElementById("proofMeta");
    const proofMetricsList = document.getElementById("proofMetricsList");
    const proofDailyLog = document.getElementById("proofDailyLog");
    const proofJsonPreview = document.getElementById("proofJsonPreview");
    const proofJson = document.getElementById("proofJson");

    const metricKeyMap = {
      "Active Users": "active_users",
      "Usuarios activos": "active_users",
      "Accounts Created": "accounts_created",
      "Cuentas creadas": "accounts_created",
      "Chats Started": "chat_sessions_created",
      "Chats iniciados": "chat_sessions_created",
      "Completed Chats": "chat_completion_succeeded",
      "Chats completados": "chat_completion_succeeded",
      "Stopped Chats": "chat_completion_stopped",
      "Chats detenidos": "chat_completion_stopped",
      "Docs Created": "documents_created",
      "Docs creados": "documents_created",
      "Docs Updated": "documents_updated",
      "Docs actualizados": "documents_updated",
      "Wiki Opens": "wiki_shell_open",
      "Aperturas de Wiki": "wiki_shell_open",
      "Learn Opens": "learn_shell_open",
      "Aperturas de Aprender": "learn_shell_open"
    };

    function setStatus(text, isError = false) {
      proofStatus.textContent = text;
      proofStatus.classList.toggle("err", !!isError);
    }

    function waitFor(check, timeoutMs = 30000, intervalMs = 200) {
      const started = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          try {
            const value = check();
            if (value) {
              resolve(value);
              return;
            }
          } catch {}
          if (Date.now() - started >= timeoutMs) {
            reject(new Error("Timed out waiting for portal state"));
            return;
          }
          setTimeout(tick, intervalMs);
        };
        tick();
      });
    }

    async function loginAdmin() {
      const response = await fetch(`${APP_API}/auth/login`, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: adminUsername, password: adminPassword })
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || "Admin login failed");
      }
    }

    function findAnalyticsSurface(frameDoc) {
      const surfaces = Array.from(frameDoc.querySelectorAll(".expand-surface"));
      return surfaces.find((surface) => {
        const heading = surface.querySelector(".surface-title");
        const title = String(heading?.textContent || "").trim();
        return title === "Usage Analytics" || title === "Analíticas de uso";
      }) || null;
    }

    function collectMetrics(frameDoc) {
      const analyticsSurface = findAnalyticsSurface(frameDoc);
      if (!analyticsSurface) {
        throw new Error("Analytics section not found in admin panel");
      }
      const metrics = {};
      const cards = Array.from(analyticsSurface.querySelectorAll(".stat-card")).map((card) => {
        const label = String(card.querySelector(".label-caps")?.textContent || "").trim();
        const valueText = String(card.querySelector(".value")?.textContent || "").trim();
        const key = metricKeyMap[label] || label;
        const numeric = Number(String(valueText).replace(/[^\d.-]/g, "")) || 0;
        metrics[key] = numeric;
        return { key, label, value: numeric, raw: valueText };
      });
      const logs = Array.from(analyticsSurface.querySelectorAll(".log-card"));
      const dailyLog = String(logs[0]?.textContent || "").trim();
      const dailyMetrics = {};
      dailyLog.split(/\r?\n/).forEach((line) => {
        const matches = line.matchAll(/([a-z_]+)=([0-9]+)/gi);
        for (const match of matches) {
          dailyMetrics[String(match[1] || "").toLowerCase()] = Number(match[2] || "0");
        }
      });
      return {
        label,
        captured_at: new Date().toISOString(),
        cards,
        metrics,
        daily_log: dailyLog,
        daily_metrics: dailyMetrics,
        breakdown_log: String(logs[1]?.textContent || "").trim()
      };
    }

    async function openAdminPanel() {
      portalFrame.src = "/";
      await waitFor(() => portalFrame.contentDocument && portalFrame.contentWindow, 30000, 250);
      const frameDoc = portalFrame.contentDocument;
      await waitFor(() => {
        const button = frameDoc.getElementById("adminToggleBtn");
        return button && !button.classList.contains("hidden") ? button : null;
      }, 30000, 250).then((button) => button.click());

      await waitFor(() => {
        const adminSection = frameDoc.getElementById("adminSection");
        return adminSection && !adminSection.classList.contains("hidden") ? adminSection : null;
      }, 30000, 250);

      if (dateFrom || dateTo) {
        const fromInput = frameDoc.getElementById("adminAnalyticsFrom");
        const toInput = frameDoc.getElementById("adminAnalyticsTo");
        if (fromInput && dateFrom) {
          fromInput.value = dateFrom;
          fromInput.dispatchEvent(new Event("input", { bubbles: true }));
        }
        if (toInput && dateTo) {
          toInput.value = dateTo;
          toInput.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }

      await waitFor(() => {
        const surface = findAnalyticsSurface(frameDoc);
        return surface && surface.querySelector(".stat-card .value") ? surface : null;
      }, 30000, 250);

      await new Promise((resolve) => setTimeout(resolve, 1200));
      return frameDoc;
    }

    function renderSnapshot(snapshot) {
      proofMetricsList.innerHTML = snapshot.cards.map((card) => `
        <div class="metric">
          <div class="metric-label">${card.label}</div>
          <div class="metric-value">${card.raw}</div>
        </div>
      `).join("");
      proofDailyLog.textContent = snapshot.daily_log || "No daily log";
      const jsonText = JSON.stringify(snapshot, null, 2);
      proofJson.textContent = jsonText;
      proofJsonPreview.textContent = jsonText;
    }

    async function main() {
      proofLabel.textContent = label;
      proofMeta.textContent = `Admin ${adminUsername} | ${new Date().toISOString()}`;
      try {
        setStatus("Logging in");
        await loginAdmin();
        setStatus("Opening admin panel");
        const frameDoc = await openAdminPanel();
        setStatus("Collecting metrics");
        const snapshot = collectMetrics(frameDoc);
        renderSnapshot(snapshot);
        setStatus("Ready");
        document.body.setAttribute("data-proof-ready", "true");
      } catch (error) {
        setStatus(error instanceof Error ? error.message : "Proof failed", true);
        proofDailyLog.textContent = error instanceof Error ? error.stack || error.message : String(error);
        proofJson.textContent = JSON.stringify({ error: String(error) }, null, 2);
        proofJsonPreview.textContent = proofJson.textContent;
        document.body.setAttribute("data-proof-ready", "false");
      }
    }

    main();
  </script>
</body>
</html>
