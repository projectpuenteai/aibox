<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutorial General — Project Puente AI</title>
    <style>
      :root {
        --bg:         #eaf2fb;
        --bg-end:     #d6e4f6;
        --panel:      #ffffff;
        --border:     #d9e5f3;
        --accent:     #2f74db;
        --accent-s:   #1b4f9c;
        --accent-bg:  #eef4fb;
        --text:       #0f172a;
        --text-soft:  #475569;
        --text-muted: #64748b;
        --shadow:     0 8px 32px rgba(27,76,138,.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:         #0c1730;
          --bg-end:     #0f1f36;
          --panel:      #162844;
          --border:     #294669;
          --accent:     #5b8ff5;
          --accent-s:   #7aa6ff;
          --accent-bg:  #162844;
          --text:       #f8fafc;
          --text-soft:  #cbd5e1;
          --text-muted: #94a3b8;
          --shadow:     0 8px 32px rgba(0,0,0,.3);
        }
      }
      html[data-theme="light"] {
        --bg:         #eaf2fb;
        --bg-end:     #d6e4f6;
        --panel:      #ffffff;
        --border:     #d9e5f3;
        --accent:     #2f74db;
        --accent-s:   #1b4f9c;
        --accent-bg:  #eef4fb;
        --text:       #0f172a;
        --text-soft:  #475569;
        --text-muted: #64748b;
        --shadow:     0 8px 32px rgba(27,76,138,.1);
      }
      html[data-theme="dark"] {
        --bg:         #0c1730;
        --bg-end:     #0f1f36;
        --panel:      #162844;
        --border:     #294669;
        --accent:     #5b8ff5;
        --accent-s:   #7aa6ff;
        --accent-bg:  #162844;
        --text:       #f8fafc;
        --text-soft:  #cbd5e1;
        --text-muted: #94a3b8;
        --shadow:     0 8px 32px rgba(0,0,0,.3);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { min-height: 100%; }
      body {
        font-family: Aptos, "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, var(--bg) 0%, var(--bg-end) 100%);
        color: var(--text);
        padding: 32px 20px 64px;
      }
      .wrap { max-width: 780px; margin: 0 auto; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: var(--shadow);
        transition: transform .15s ease, background .15s ease;
      }
      .back-link:hover {
        transform: translateX(-2px);
        background: var(--accent-bg);
      }
      .brand {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 600;
        letter-spacing: .04em;
        text-transform: uppercase;
      }
      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -.01em;
      }
      .placeholder {
        margin-top: 24px;
        padding: 36px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        text-align: center;
      }
      .placeholder-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 16px;
        background: var(--accent-bg);
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .placeholder-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .placeholder-text {
        color: var(--text-soft);
        font-size: 15px;
        line-height: 1.6;
        max-width: 520px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <a class="back-link" href="./">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          <span>Volver a tutoriales</span>
        </a>
        <span class="brand">Project Puente AI</span>
      </div>

      <h1>Tutorial General</h1>

      <div class="placeholder">
        <div class="placeholder-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div class="placeholder-title">Próximamente</div>
        <div class="placeholder-text">
          Esta sección está en construcción. Próximamente encontrarás aquí guías
          paso a paso sobre cómo usar el portal Puente AI: cuentas, chat con la IA,
          biblioteca de Wikipedia, Kolibri y más.
        </div>
      </div>
    </div>

    <script>
      (function () {
        try {
          var t = localStorage.getItem("puente-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
