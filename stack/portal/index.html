<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Puente AI</title>
    <style>
      :root {
        --bg: #eaf2fb;
        --bg-mid: #e2edf9;
        --bg-end: #d6e4f6;
        --header-bg: rgba(255, 255, 255, 0.95);
        --header-border: #dbe4ef;
        --text: #0f172a;
        --text-soft: #475569;
        --text-muted: #64748b;
        --panel: #ffffff;
        --panel-border: #d9e5f3;
        --panel-soft: #f8fbff;
        --panel-accent: #edf4ff;
        --accent: #2f74db;
        --accent-strong: #1b4f9c;
        --accent-soft: #eef4fb;
        --danger: #b42318;
        --danger-soft: #fff1f2;
        --shadow: 0 24px 70px rgba(27, 76, 138, 0.12);
        --shell-border: rgba(255, 255, 255, 0.72);
        --welcome-title: linear-gradient(90deg, #2a66c8, #1e56aa, #163d7a);
        --accent-bar: linear-gradient(90deg, #6aa2f0, #2f74db, #1b4f9c);
        --glow-a: rgba(61, 125, 219, 0.16);
        --glow-b: rgba(28, 79, 149, 0.14);
        --glow-c: rgba(115, 167, 239, 0.12);
        --input-bg: #ffffff;
        --input-border: #cbd5e1;
        --selected-bg: color-mix(in srgb, var(--accent) 10%, var(--panel));
        --selected-border: #2f74db;
        --selected-shadow: 0 10px 30px rgba(47, 116, 219, 0.12);
      }

      html[data-theme="dark"] {
        --bg: #0c1730;
        --bg-mid: #132742;
        --bg-end: #0f1f36;
        --header-bg: rgba(18, 35, 61, 0.95);
        --header-border: #223a5e;
        --text: #f8fafc;
        --text-soft: #cbd5e1;
        --text-muted: #94a3b8;
        --panel: #162844;
        --panel-border: #294669;
        --panel-soft: #14263f;
        --panel-accent: #173154;
        --accent: #5b8ff5;
        --accent-strong: #7aa6ff;
        --accent-soft: #162844;
        --danger: #fca5a5;
        --danger-soft: rgba(127, 29, 29, 0.32);
        --shadow: 0 24px 70px rgba(3, 10, 25, 0.35);
        --shell-border: rgba(41, 70, 105, 0.9);
        --welcome-title: linear-gradient(90deg, #8ab7ff, #68a0ff, #c0d7ff);
        --accent-bar: linear-gradient(90deg, #5b8ff5, #2f74db, #7aa6ff);
        --glow-a: rgba(42, 102, 200, 0.18);
        --glow-b: rgba(18, 59, 122, 0.18);
        --glow-c: rgba(33, 79, 148, 0.14);
        --input-bg: #10213a;
        --input-border: #35557f;
        --selected-bg: color-mix(in srgb, var(--accent) 22%, var(--panel));
        --selected-border: #7db1ff;
        --selected-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        font-family: Aptos, "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, var(--bg) 0%, var(--bg-mid) 48%, var(--bg-end) 100%);
        color: var(--text);
      }
      button, input { font: inherit; }
      a { color: inherit; }
      .hidden { display: none !important; }
      .app {
        position: relative;
        min-height: 100vh;
      }
      .outer-page {
        position: relative;
        min-height: 100vh;
        overflow: visible;
        padding: 20px 20px 48px;
      }
      .page-inner {
        position: relative;
        z-index: 1;
        max-width: 1120px;
        margin: 0 auto;
      }
      .outer-shell {
        position: relative;
        z-index: 1;
        border-radius: 30px;
        border: 1px solid var(--shell-border);
        background: color-mix(in srgb, var(--panel) 84%, transparent);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }
      .topbar {
        border-bottom: 1px solid var(--header-border);
      }
      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 24px;
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand img {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        object-fit: cover;
      }
      .brand-title {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .brand-copy {
        display: grid;
        gap: 2px;
      }
      .brand-meta {
        min-height: 1.1em;
        font-size: 0.92rem;
        color: var(--text-soft);
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .header-btn, .lang-btn, .pill-btn, .submit-btn, .tool-link, .admin-btn, .ghost-link {
        appearance: none;
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        min-height: 44px;
        padding: 0 16px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      }
      .topbar .header-btn,
      .topbar .lang-btn {
        min-height: 58px;
        border-radius: 22px;
        padding: 0 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 650;
      }
      .header-btn:hover, .lang-btn:hover, .pill-btn:hover, .submit-btn:hover, .tool-link:hover, .admin-btn:hover, .ghost-link:hover {
        transform: translateY(-1px);
        border-color: rgba(47, 116, 219, 0.45);
      }
      .lang-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--accent-soft);
        color: var(--text-soft);
        font-weight: 600;
      }
      .submit-btn, .tool-link.primary, .admin-btn.primary {
        border-color: var(--accent);
        background: linear-gradient(90deg, #4b84e4 0%, var(--accent) 100%);
        color: #ffffff;
        box-shadow: 0 16px 32px rgba(47, 116, 219, 0.22);
      }
      .header-btn.danger, .admin-btn.danger {
        background: var(--danger-soft);
        border-color: rgba(180, 35, 24, 0.2);
        color: var(--danger);
      }
      .icon-btn {
        width: 58px;
        min-width: 58px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn-inline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .btn-icon,
      #themeToggleIcon {
        display: inline-flex;
        width: 22px;
        height: 22px;
        align-items: center;
        justify-content: center;
        flex: 0 0 22px;
      }
      .btn-inline svg,
      #themeToggleIcon svg,
      .icon svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .glow {
        position: fixed;
        border-radius: 999px;
        filter: blur(78px);
        pointer-events: none;
        z-index: 0;
      }
      .glow.a { left: -120px; top: 28px; width: 280px; height: 280px; background: var(--glow-a); }
      .glow.b { right: -80px; top: 64px; width: 320px; height: 320px; background: var(--glow-b); }
      .glow.c { left: 50%; bottom: -72px; width: 280px; height: 280px; transform: translateX(-50%); background: var(--glow-c); }
      .shell-content {
        padding: 20px 28px 28px;
      }
      .auth-shell {
        width: 100%;
      }
      .welcome-shell, .card-shell, .dashboard-shell, .admin-shell {
        border: 1px solid var(--panel-border);
        background: color-mix(in srgb, var(--panel) 94%, transparent);
        box-shadow: 0 18px 42px rgba(27, 76, 138, 0.08);
      }
      .welcome-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 24px;
        width: min(1080px, 100%);
        margin: 0 auto;
        border-radius: 36px;
        padding: 26px;
      }
      .welcome-panel {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        border: 1px solid color-mix(in srgb, var(--accent) 16%, var(--panel-border));
        background:
          radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 18%, transparent), transparent 48%),
          linear-gradient(160deg, color-mix(in srgb, var(--panel) 92%, transparent), color-mix(in srgb, var(--panel-soft) 96%, transparent));
        padding: 34px;
      }
      .welcome-panel::after {
        content: "";
        position: absolute;
        right: -46px;
        bottom: -46px;
        width: 180px;
        height: 180px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 16%, transparent);
        filter: blur(20px);
      }
      .welcome-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--panel-border));
        background: color-mix(in srgb, var(--panel) 86%, transparent);
        color: var(--accent-strong);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .welcome-brand {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-top: 26px;
      }
      .welcome-logo-wrap {
        width: 92px;
        height: 92px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--panel-border));
        background: color-mix(in srgb, var(--panel) 96%, transparent);
        box-shadow: 0 16px 34px rgba(27, 76, 138, 0.1);
      }
      .welcome-logo {
        width: 64px;
        height: 64px;
        border-radius: 999px;
        object-fit: cover;
        background: #ffffff;
      }
      .welcome-title {
        margin: 28px 0 0;
        max-width: 10ch;
        font-size: clamp(2.8rem, 5vw, 4.15rem);
        line-height: 0.98;
        font-weight: 760;
        letter-spacing: -0.06em;
        background: var(--welcome-title);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .welcome-subtitle {
        margin: 18px 0 0;
        max-width: 34rem;
        font-size: 1.12rem;
        line-height: 1.75;
        color: var(--text-soft);
      }
      .accent-bar {
        width: 120px;
        height: 6px;
        margin: 24px 0 0;
        border-radius: 999px;
        background: var(--accent-bar);
      }
      .welcome-foot {
        display: grid;
        gap: 14px;
        margin-top: 32px;
      }
      .welcome-foot-card {
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--panel-border));
        background: color-mix(in srgb, var(--panel) 86%, transparent);
        color: var(--text-soft);
        line-height: 1.65;
      }
      .welcome-foot-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .welcome-actions {
        display: grid;
        gap: 16px;
        align-content: center;
      }
      .action-list {
        display: grid;
        gap: 16px;
      }
      .action-card {
        display: flex;
        align-items: center;
        gap: 18px;
        width: 100%;
        padding: 22px 22px 22px 20px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 98%, transparent), color-mix(in srgb, var(--panel-soft) 96%, transparent));
        color: inherit;
        text-align: left;
        cursor: pointer;
        box-shadow: 0 14px 28px rgba(27, 76, 138, 0.08);
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      }
      .action-card:hover {
        transform: translateY(-2px);
        border-color: color-mix(in srgb, var(--accent) 36%, var(--panel-border));
        box-shadow: 0 20px 36px rgba(27, 76, 138, 0.14);
      }
      .action-icon {
        width: 72px;
        height: 72px;
        flex: 0 0 72px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background: var(--panel-accent);
        color: var(--accent);
      }
      .action-title {
        font-size: 1.45rem;
        font-weight: 720;
        letter-spacing: -0.03em;
      }
      .action-desc {
        margin-top: 6px;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--text-muted);
      }
      .auth-flow {
        display: flex;
        justify-content: center;
        width: 100%;
      }
      .card-shell {
        width: min(1040px, 100%);
        border-radius: 32px;
        padding: 22px;
      }
      .create-card {
        width: min(1120px, 100%);
      }
      .compact-card {
        width: min(760px, 100%);
      }
      .flow-grid {
        display: grid;
        grid-template-columns: minmax(240px, 0.85fr) minmax(0, 1.15fr);
        gap: 22px;
        align-items: start;
      }
      .compact-card .flow-grid {
        grid-template-columns: minmax(0, 1fr);
      }
      .flow-sidebar {
        position: sticky;
        top: 20px;
        display: grid;
        gap: 16px;
      }
      .back-row {
        display: flex;
        justify-content: flex-start;
      }
      .ghost-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: color-mix(in srgb, var(--panel) 95%, transparent);
        color: var(--text-soft);
        font-weight: 600;
      }
      .flow-hero {
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid color-mix(in srgb, var(--accent) 16%, var(--panel-border));
        background:
          radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 18%, transparent), transparent 44%),
          linear-gradient(160deg, color-mix(in srgb, var(--panel) 97%, transparent), color-mix(in srgb, var(--panel-soft) 98%, transparent));
        padding: 24px;
      }
      .flow-hero img {
        width: 74px;
        height: 74px;
        border-radius: 24px;
        object-fit: cover;
      }
      .flow-kicker {
        margin-top: 16px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .card-header {
        margin-top: 12px;
      }
      .card-header h2 {
        margin: 0;
        font-size: clamp(2.2rem, 4vw, 3.2rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }
      .card-header p {
        margin: 14px 0 0;
        font-size: 1.02rem;
        line-height: 1.72;
        color: var(--text-soft);
      }
      .flow-side-note {
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--panel-border));
        background: color-mix(in srgb, var(--panel-accent) 52%, var(--panel));
        color: var(--text-soft);
        line-height: 1.65;
      }
      .flow-content {
        display: grid;
        gap: 16px;
      }
      .create-layout {
        display: grid;
        gap: 20px;
      }
      .create-top {
        display: grid;
        gap: 14px;
      }
      .create-hero {
        padding: 28px;
      }
      .create-body {
        display: grid;
        gap: 16px;
      }
      .create-body .section-panel,
      .create-body .submit-area {
        width: 100%;
      }
      .section-panel {
        margin: 0;
        padding: 22px;
        border: 1px solid var(--panel-border);
        border-radius: 26px;
        background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 98%, transparent), color-mix(in srgb, var(--panel-soft) 98%, transparent));
      }
      .section-panel.remember {
        background: color-mix(in srgb, var(--panel-accent) 45%, var(--panel));
      }
      .section-panel h3 {
        margin: 0;
        font-size: 1.18rem;
        letter-spacing: -0.02em;
      }
      .section-panel p, .section-panel .helper {
        margin: 10px 0 0;
        color: var(--text-soft);
        line-height: 1.72;
      }
      .helper { color: var(--text-muted); }
      .pref-grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }
      .pref-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pill-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 84px;
        padding: 20px 22px;
        background: color-mix(in srgb, var(--panel) 98%, transparent);
        color: var(--text-soft);
        font-size: 1.02rem;
        font-weight: 700;
        text-align: left;
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--panel-border) 70%, transparent);
      }
      .pill-btn.selected {
        border-color: var(--selected-border);
        background: var(--selected-bg);
        color: var(--text);
        box-shadow: var(--selected-shadow);
        transform: translateY(-1px);
      }
      .pill-btn.selected .pill-main {
        color: var(--text);
      }
      .pill-btn .check {
        opacity: 0;
        color: var(--selected-border);
        flex: 0 0 auto;
      }
      .pill-btn.selected .check {
        opacity: 1;
      }
      .pill-main {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 1.02rem;
        line-height: 1.35;
      }
      .pill-main .icon {
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 24px;
      }
      .field {
        margin-top: 16px;
      }
      .field label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-soft);
      }
      .field input {
        width: 100%;
        min-height: 60px;
        padding: 14px 18px;
        border: 1px solid var(--input-border);
        border-radius: 22px;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
      }
      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(47, 116, 219, 0.15);
      }
      .error {
        margin-top: 10px;
        min-height: 22px;
        color: var(--danger);
        font-size: 0.95rem;
      }
      .inline-error {
        margin-top: 8px;
        color: var(--danger);
        font-size: 0.92rem;
      }
      .submit-area {
        display: grid;
        gap: 14px;
      }
      .submit-btn {
        width: 100%;
        min-height: 64px;
        font-size: 1.05rem;
        font-weight: 700;
      }
      .note-box {
        padding: 16px 18px;
        border: 1px solid color-mix(in srgb, var(--accent) 14%, var(--panel-border));
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel-accent) 34%, var(--panel));
        color: var(--text-soft);
        line-height: 1.68;
      }
      .portal-shell,
      .portal-admin-shell {
        display: grid;
        gap: 24px;
      }
      .portal-surface,
      .admin-surface,
      .runtime-surface,
      .accounts-surface,
      .expand-surface,
      .account-item,
      .stat-card,
      .portal-tool-card {
        border: 1px solid var(--panel-border);
        background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 98%, transparent), color-mix(in srgb, var(--panel-soft) 96%, transparent));
        box-shadow: 0 14px 28px rgba(27, 76, 138, 0.08);
      }
      .portal-surface,
      .admin-surface {
        border-radius: 30px;
        padding: 30px;
      }
      .portal-eyebrow,
      .admin-eyebrow,
      .label-caps {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .portal-heading,
      .admin-heading {
        margin: 14px 0 0;
        font-size: clamp(2.4rem, 5vw, 3.35rem);
        line-height: 1.02;
        letter-spacing: -0.05em;
      }
      .portal-subheading,
      .admin-subheading,
      .surface-subtitle {
        margin: 16px 0 0;
        max-width: 760px;
        font-size: 1.08rem;
        line-height: 1.7;
        color: var(--text-soft);
      }
      .portal-tool-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
      }
      .portal-tool-card {
        min-height: 295px;
        border-radius: 28px;
        padding: 32px 28px;
        text-decoration: none;
        color: inherit;
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      }
      .portal-tool-card:hover {
        transform: translateY(-3px);
        border-color: color-mix(in srgb, var(--accent) 36%, var(--panel-border));
        box-shadow: 0 22px 38px rgba(27, 76, 138, 0.16);
      }
      .portal-tool-inner {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .portal-tool-icon {
        width: 108px;
        height: 108px;
        margin-bottom: 34px;
        display: grid;
        place-items: center;
        border-radius: 32px;
        background: var(--accent-soft);
        color: var(--accent);
      }
      .portal-tool-icon svg {
        width: 72px;
        height: 72px;
        display: block;
      }
      .portal-tool-title {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
      .portal-tool-body {
        margin-top: 18px;

      function getCopy() {

      function format(text, vars = {}) {
        return String(text || "").replace(/\{(\w+)\}/g, (_, key) => String(vars[key] ?? ""));
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function icon(name) {
        return ICONS[name] || "";
      }

      function buttonLabel(iconName, label) {
        return `<span class="btn-inline"><span class="btn-icon">${icon(iconName)}</span><span>${escapeHtml(label)}</span></span>`;
      }

      function formatNumber(value) {
        return Number(value || 0).toLocaleString();
      }

      function isoDateOffset(days) {
        const value = new Date();
        value.setDate(value.getDate() + days);
        return value.toISOString().slice(0, 10);
      }

      function ensureAnalyticsRange() {
        if (!state.analyticsDateTo) {
          state.analyticsDateTo = isoDateOffset(0);
        }
        if (!state.analyticsDateFrom) {
          state.analyticsDateFrom = isoDateOffset(-13);
        }
      }

      function analyticsBreakdownLines(items, keyName) {
        if (!Array.isArray(items) || !items.length) return ["- none"];
        return items.map((item) => `- ${item[keyName] || "unknown"}: ${formatNumber(item.value)}`);
      }

      function buildAnalyticsDailyLog(t) {
        if (!Array.isArray(state.analyticsTimeseries) || !state.analyticsTimeseries.length) {
          return t.analyticsNoData;
        }
        return state.analyticsTimeseries.map((row) => {
          return [
            `[${row.day || "unknown"}] active=${formatNumber(row.active_users)}`,
            `accounts=${formatNumber(row.accounts_created)} logins=${formatNumber(row.logins_succeeded)} chats=${formatNumber(row.chat_sessions_created)} complete=${formatNumber(row.chat_completion_succeeded)} stopped=${formatNumber(row.chat_completion_stopped)}`,
            `docs_created=${formatNumber(row.documents_created)} docs_updated=${formatNumber(row.documents_updated)} docs_deleted=${formatNumber(row.documents_deleted)} docs_restored=${formatNumber(row.documents_restored)} wiki=${formatNumber(row.wiki_shell_open)} learn=${formatNumber(row.learn_shell_open)}`
          ].join("\n");
        }).join("\n\n");
      }

      function buildAnalyticsBreakdowns(t) {
        const summary = state.analyticsSummary || {};
        return [
          t.analyticsBySurface,
          ...analyticsBreakdownLines(summary.by_surface, "surface"),
          "",
          t.analyticsByRole,
          ...analyticsBreakdownLines(summary.by_role, "role"),
          "",
          t.analyticsByLanguage,
          ...analyticsBreakdownLines(summary.by_language, "language")
        ].join("\n");
      }

      function postAnalyticsEvent(eventName, surface, metadata = {}) {
        const payload = JSON.stringify({ event_name: eventName, surface, metadata });
        try {
          if (navigator.sendBeacon) {
            const blob = new Blob([payload], { type: "application/json" });
            if (navigator.sendBeacon(`${APP_API}/analytics/events`, blob)) {
              return;
            }
          }
        } catch {}
        fetch(`${APP_API}/analytics/events`, {
          method: "POST",
          credentials: "same-origin",
          keepalive: true,
          headers: { "Content-Type": "application/json" },
          body: payload
        }).catch(() => {});
      }

        if (adminAutoRefreshTimer) {
          clearInterval(adminAutoRefreshTimer);
          adminAutoRefreshTimer = null;
        }
      }

      function syncAdminAutoRefresh() {
        stopAdminAutoRefresh();
        if (!state.user || state.user.role !== "admin" || !state.adminVisible) return;
        adminAutoRefreshTimer = setInterval(() => {
          refreshAdminConsole().catch(() => {});
        }, ADMIN_AUTO_REFRESH_MS);
      }

      function readLocalPreferences() {
        try {
          const language = localStorage.getItem(STORAGE_KEYS.language);
          const theme = localStorage.getItem(STORAGE_KEYS.theme);
          if (language === "en" || language === "es") {
            state.language = language;
            state.preferredLanguage = language;
          } else {
            state.language = "es";
            state.preferredLanguage = "es";
          }
          if (theme === "light" || theme === "dark") {
            state.theme = theme;
          }
        } catch {}
      }

      function writeLocalPreferences() {
        try {
          localStorage.setItem(STORAGE_KEYS.language, state.language);
          localStorage.setItem(STORAGE_KEYS.theme, state.theme);
        } catch {}
      }

      function normalizeRoleLabel(role) {
        if (state.language === "es") {
          if (role === "admin") return "admin";
          if (role === "guest") return "invitado";
          return "usuario";
        }
        return role || "user";
      }

      function formatDateTime(value) {
        if (!value) return "";
        try {
          const date = new Date(value);
          if (Number.isNaN(date.getTime())) return String(value);
          return date.toLocaleString(state.language === "es" ? "es-ES" : "en-US");
        } catch {
          return String(value);
        }
      }

      function applyTheme(theme) {
        state.theme = theme === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", state.theme);
        writeLocalPreferences();
        renderThemeToggle();
      }

      async function persistPreferences(overrides = {}) {
        if (!state.user) return;
        const payload = {
          preferred_language: overrides.preferred_language || state.language,
          preferred_theme: overrides.preferred_theme || state.theme
        };
        const response = await api("/auth/preferences", "POST", payload);
        if (response && response.user) {
          state.user = { ...state.user, ...response.user };
          syncPreferencesFromUser(response.user);
        }
      }

      function syncPreferencesFromUser(user) {
        if (!user) return;
        const preferredLanguage = user.preferred_language === "es" ? "es" : "en";
        const preferredTheme = user.preferred_theme === "dark" ? "dark" : "light";
        state.language = preferredLanguage;
        state.preferredLanguage = preferredLanguage;
        applyTheme(preferredTheme);
        writeLocalPreferences();
      }

      function getRuntimePresentation() {
        const t = getCopy();
        const payload = state.aiStatus || {};
        const health = payload.health;
        const llamaState = String(payload.llama_state || "").toLowerCase();
        let key = "okay";
        if (llamaState.includes("restart")) {
          key = "restarting";
        } else if (payload.enabled === false || llamaState === "stopped" || String(health).toLowerCase() === "false") {
          key = "stopped";
        } else if (String(health).toLowerCase() === "true") {
          key = "good";
        }
        const labels = {
          good: t.runtimeRunning,
          okay: t.runtimeOkay,
          stopped: t.runtimeStopped,
          restarting: t.runtimeRestarting
        };
        return {
          key,
          label: labels[key],
          healthValue: health == null ? t.runtimeUnknown : String(health),
          modeValue: payload.override_mode || "auto",
          llamaValue: payload.llama_state || t.runtimeUnknown,
          reasonValue: payload.status_reason || t.runtimeUnknown
        };
      }

        const query = (state.accountsQuery || "").trim().toLowerCase();

      function buildRestrictionLine(user, t) {
        const docsBlock = user.docs_write_blocked_until ? format(t.docsBlockedUntil, { value: user.docs_write_blocked_until }) : "";
        const aiBlock = user.ai_send_blocked_until
          ? format(t.aiBlockedUntil, { value: user.ai_send_blocked_until })
          : (user.ai_prompt_cooldown_until ? format(t.aiCooldownUntil, { value: user.ai_prompt_cooldown_until }) : "");
        return [docsBlock, aiBlock].filter(Boolean).join(" | ") || t.noRestrictions;
      }

      function buildLockLabel(user, t) {
        if (Number(user.manual_lock_permanent || 0) === 1) {
          return t.lockPermanent;
        }
        const value = user.manual_locked_until || user.locked_until;
        return value ? formatDateTime(value) : t.lockNone;
      }

      function buildStorageLog(t) {
        const payload = state.insights;
        if (!payload || typeof payload !== "object") return t.noStorageData;
        const userLimit = state.storageExpanded ? 10 : 3;
        const fileLimit = state.storageExpanded ? 5 : 3;
        const topUsers = Array.isArray(payload.top_users) ? payload.top_users.slice(0, userLimit) : [];
        const docs = Array.isArray(payload.largest_documents) ? payload.largest_documents.slice(0, fileLimit) : [];
        const chats = Array.isArray(payload.largest_chats) ? payload.largest_chats.slice(0, fileLimit) : [];
        const lines = [t.topUsersByStorage];
        for (const user of topUsers) {
          lines.push(format(t.topUsersLine, {
            username: user.username,
            bytes: Number(user.storage_bytes_used || 0).toLocaleString()
          }));
        }
        lines.push("", t.largestDocuments);
        for (const doc of docs) {
          lines.push(format(t.largestDocumentLine, {
            username: doc.username,
            title: doc.title,
            bytes: Number(doc.size_bytes || 0).toLocaleString(),
            type: doc.type
          }));
        }
        lines.push("", t.largestChats);
        for (const chat of chats) {
          lines.push(format(t.largestChatLine, {
            username: chat.username,
            title: chat.title,
            bytes: Number(chat.size_bytes || 0).toLocaleString(),
            tokens: Number(chat.token_count_estimate || 0).toLocaleString()
          }));
        }
        return lines.join("\n");
      }

      function buildEventsLog(t) {
        if (!state.events.length) return t.noSecurityEvents;
        const limit = state.securityExpanded ? 12 : 4;
        return state.events.slice(0, limit).map((event) => {
          const when = event.created_at ? formatDateTime(event.created_at) : "unknown";
          return format(t.securityEventLine, {
            when,
            severity: event.severity || "info",
            eventType: event.event_type || "event",
            user: event.username || event.user_id || "unknown",
            ip: event.ip || "",
            endpoint: event.endpoint || "",
            detail: event.detail || ""
          });
        }).join("\n\n");
      }

      async function api(path, method = "GET", body = undefined) {
        const cfg = { method, credentials: "same-origin", headers: {} };
        if (body !== undefined) {
          cfg.headers["Content-Type"] = "application/json";
          cfg.body = JSON.stringify(body);
        }
        const response = await fetch(APP_API + path, cfg);
        const text = await response.text();
        let payload = {};
        try { payload = text ? JSON.parse(text) : {}; } catch { payload = {}; }
        if (!response.ok) {
          const error = new Error(payload.detail || payload.message || text || `Request failed (${response.status})`);
          error.status = response.status;
          error.payload = payload;
          throw error;
        }
        return payload;
      }

      async function refreshSession() {
        try {
          const payload = await api("/auth/me");
          state.user = payload.user || null;
          if (state.user) {
            syncPreferencesFromUser(state.user);
          }
        } catch {
          state.user = null;
        }
        if (!state.user) {
          state.adminVisible = false;
          state.aiStatus = null;
          state.users = [];
          state.events = [];
          state.insights = null;
          state.analyticsSummary = null;
          state.analyticsTimeseries = [];
          state.analyticsError = "";
          state.accountsQuery = "";
          state.accountUi = {};
        }
        syncAdminAutoRefresh();
        renderStaticText();
        renderAuthScreen();
        renderPortal();
      }

      function validateSignupForm() {
        const t = getCopy();
        const username = (ui.signupUser.value || "").trim();
        const password = ui.signupPass.value || "";
        const confirm = ui.signupConfirm.value || "";
        let valid = true;
        ui.signupError.textContent = "";
        ui.passwordInlineError.textContent = "";
        ui.confirmInlineError.textContent = "";
        if (!username) {
          ui.signupError.textContent = t.usernameRequired;
          valid = false;
        }
        if (!password) {
          ui.passwordInlineError.textContent = t.passwordRequired;
          valid = false;
        } else if (password.length < 4) {
          ui.passwordInlineError.textContent = t.passwordTooShort;
          valid = false;
        }
        if (confirm !== password) {
          ui.confirmInlineError.textContent = t.passwordMismatch;
          valid = false;
        }
        return valid;
      }

      function createRandomString(length = 8) {
        const alphabet = "abcdefghjkmnpqrstuvwxyz23456789";
        const chars = [];
        if (window.crypto && typeof window.crypto.getRandomValues === "function") {
          const values = new Uint8Array(length);
          window.crypto.getRandomValues(values);
          for (const value of values) {
            chars.push(alphabet[value % alphabet.length]);
          }
          return chars.join("");
        }
        for (let i = 0; i < length; i += 1) {
          chars.push(alphabet[Math.floor(Math.random() * alphabet.length)]);
        }
        return chars.join("");
      }

      function createGuestCredentials() {
        return {
          username: `guest-${Date.now().toString(36)}-${createRandomString(6)}`,
          password: `guest-${createRandomString(18)}${createRandomString(6)}`
        };
      }

      async function continueAsGuest() {
        const t = getCopy();
        ui.guestError.textContent = "";
        ui.guestLoginBtn.disabled = true;
        ui.guestLoginBtn.textContent = t.guestCreating;
        try {
          let lastError = null;
          for (let attempt = 0; attempt < 5; attempt += 1) {
            const creds = createGuestCredentials();
            try {
              await api("/auth/signup", "POST", {
                username: creds.username,
                password: creds.password,
                role: "guest",
                preferred_language: state.language,
                preferred_theme: "light"
              });
              await api("/auth/login", "POST", { username: creds.username, password: creds.password });
              ui.loginUser.value = "";
              ui.loginPass.value = "";
              await refreshSession();
              return;
            } catch (error) {
              lastError = error;
              if (Number(error?.status || 0) === 409) continue;
              throw error;
            }
          }
          throw lastError || new Error(t.guestUnavailable);
        } catch (error) {
          ui.guestError.textContent = error instanceof Error ? error.message : t.guestFailed;
        } finally {
          ui.guestLoginBtn.disabled = false;
          ui.guestLoginBtn.textContent = t.guestButton;
        }
      }

      async function loadAdminData() {
        if (!state.user || state.user.role !== "admin") return;
        ensureAnalyticsRange();
        const query = new URLSearchParams({
          date_from: state.analyticsDateFrom,
          date_to: state.analyticsDateTo
        }).toString();
        let analyticsFailed = false;
        const [usersPayload, eventsPayload, insightsPayload, analyticsSummaryPayload, analyticsTimeseriesPayload] = await Promise.all([
          api("/admin/users").catch(() => ({ users: [] })),
          api("/admin/security-events?limit=120").catch(() => ({ events: [] })),
          api("/admin/storage-insights").catch(() => ({})),
          api(`/admin/analytics/summary?${query}`).catch(() => { analyticsFailed = true; return { summary: { totals: {}, by_surface: [], by_role: [], by_language: [] } }; }),
          api(`/admin/analytics/timeseries?${query}`).catch(() => { analyticsFailed = true; return { timeseries: [] }; })
        ]);
        state.users = Array.isArray(usersPayload.users) ? usersPayload.users : [];
        state.events = Array.isArray(eventsPayload.events) ? eventsPayload.events : [];
        state.insights = insightsPayload || null;
        state.analyticsSummary = analyticsSummaryPayload.summary || { totals: {}, by_surface: [], by_role: [], by_language: [] };
        state.analyticsTimeseries = Array.isArray(analyticsTimeseriesPayload.timeseries) ? analyticsTimeseriesPayload.timeseries : [];
        state.analyticsError = analyticsFailed ? getCopy().analyticsLoadFailed : "";
        const nextUi = {};
        for (const user of state.users) {
          if (state.accountUi[user.id]) {
            nextUi[user.id] = state.accountUi[user.id];
          }
        }
        state.accountUi = nextUi;
        if (state.adminVisible) {
          renderAdminSection();
        }
      }

        try {

          if (!response.ok) throw new Error("status failed");
          state.aiStatus = await response.json();
        } catch {
          state.aiStatus = {
            health: t.runtimeUnknown,
            override_mode: "auto",
            llama_state: t.runtimeUnknown,
            status_reason: t.aiRuntimeUnavailable,
            enabled: false
          };
        }
        if (state.adminVisible) {
          renderAdminSection();
        }
      }

      async function refreshAdminConsole() {
        if (!state.user || state.user.role !== "admin" || !state.adminVisible) return;
        if (adminAutoRefreshInFlight) return;
        adminAutoRefreshInFlight = true;
        try {
          await Promise.all([loadAdminData(), loadAiStatus()]);
        } finally {
          adminAutoRefreshInFlight = false;

      async function runAiAction(action) {
        const t = getCopy();
        const startedAt = Date.now();
        state.pendingAiAction = action;
        renderAdminSection();
        try {
          if (action === "refresh") {
            await loadAiStatus();
            return;
          }
          if (action === "toggle") {
            const enabled = !(state.aiStatus && state.aiStatus.enabled);
            const response = await fetch(AI_ADMIN_API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ enabled })
            });
            if (!response.ok) throw new Error("toggle failed");
            await loadAiStatus();
            return;
          }
          const response = await fetch(`${AI_ADMIN_RUNTIME_API}/${action}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" }
          });
          if (!response.ok) throw new Error("runtime failed");
          await loadAiStatus();
        } catch (error) {
          alert(error instanceof Error ? error.message : t.aiActionFailed);
        } finally {
          const elapsed = Date.now() - startedAt;
          if (elapsed < 420) {
            await new Promise((resolve) => setTimeout(resolve, 420 - elapsed));
          }
          state.pendingAiAction = null;
          if (state.adminVisible) {
            renderAdminSection();
          }
        }
      }

      async function toggleAdminSection() {
        if (!state.user || state.user.role !== "admin") return;
        state.adminVisible = !state.adminVisible;
        syncAdminAutoRefresh();
        renderPortal();
        if (state.adminVisible) {
          await refreshAdminConsole();
        }
      }

      function updateAccountField(uid, field, value) {
        const view = getAccountUi(uid);
        view[field] = value;
      }

      async function handleAccountSubmit(uid, action) {
        const t = getCopy();
        const view = getAccountUi(uid);
        if (action === "reset") {
          if ((view.resetPassword || "").length < 4) {
            alert(t.passwordTooShort);
            return;
          }
          try {
            await api(`/admin/users/${encodeURIComponent(uid)}/reset-password`, "POST", { password: view.resetPassword });
            view.resetPassword = "";
            view.panel = null;
            await loadAdminData();
          } catch (error) {
            alert(error instanceof Error ? error.message : t.resetFailed);
          }
          return;
        }
        if (action === "lock") {
          const reason = String(view.lockReason || "").trim();
          const duration = Number(view.lockDuration || "30");
          if (!reason) {
            alert(t.lockReasonRequired);
            return;
          }
          try {
            await api(`/admin/users/${encodeURIComponent(uid)}/lock`, "POST", {
              reason,
              duration_minutes: Math.max(1, Math.min(525600, Number.isFinite(duration) ? duration : 30))
            });
            view.lockReason = "";
            view.lockDuration = "30";
            view.panel = null;
            await loadAdminData();
          } catch (error) {
            alert(error instanceof Error ? error.message : t.lockFailed);
          }
          return;
        }
        if (action === "unlock") {
          try {
            await api(`/admin/users/${encodeURIComponent(uid)}/unlock`, "POST", { reason: view.unlockReason || "" });
            view.unlockReason = "";
            view.panel = null;
            await loadAdminData();
          } catch (error) {
            alert(error instanceof Error ? error.message : t.unlockFailed);
          }
        }
      }

      async function handleDelete(uid) {
        const t = getCopy();
        try {
          await api(`/admin/users/${encodeURIComponent(uid)}/delete`, "POST");
          delete state.accountUi[uid];
          await loadAdminData();
        } catch (error) {
          alert(error instanceof Error ? error.message : t.deleteFailed);
        }
      }

      ui.langToggleBtn.addEventListener("click", () => {
        const nextLanguage = state.language === "en" ? "es" : "en";
        setLanguage(nextLanguage, !!state.user);
      });

      ui.themeToggleBtn.addEventListener("click", () => {
        applyTheme(state.theme === "dark" ? "light" : "dark");
        if (state.user) {
          persistPreferences({ preferred_theme: state.theme }).catch(() => {});
        }
        renderPortal();
      });

      document.querySelectorAll("[data-screen]").forEach((button) => {
        button.addEventListener("click", () => {
          setScreen(button.getAttribute("data-screen") || "welcome");
        });
      });

      ui.prefSpanishBtn.addEventListener("click", () => setLanguage("es", false));
      ui.prefEnglishBtn.addEventListener("click", () => setLanguage("en", false));
      ui.themeLightBtn.addEventListener("click", () => setCreateTheme("light"));
      ui.themeDarkBtn.addEventListener("click", () => setCreateTheme("dark"));

      ui.signupForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const t = getCopy();
        if (!validateSignupForm()) return;
        ui.signupError.textContent = "";
        try {
          await api("/auth/signup", "POST", {
            username: ui.signupUser.value,
            password: ui.signupPass.value,
            role: "user",
            preferred_language: state.preferredLanguage,
            preferred_theme: state.theme
          });
          await api("/auth/login", "POST", { username: ui.signupUser.value, password: ui.signupPass.value });
          ui.signupUser.value = "";
          ui.signupPass.value = "";
          ui.signupConfirm.value = "";
          writeLocalPreferences();
          await refreshSession();
        } catch (error) {
          ui.signupError.textContent = error instanceof Error ? error.message : t.signupFailed;
        }
      });

      ui.loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const t = getCopy();
        ui.loginError.textContent = "";
        try {
          await api("/auth/login", "POST", { username: ui.loginUser.value, password: ui.loginPass.value });
          ui.loginUser.value = "";
          ui.loginPass.value = "";
          await refreshSession();
        } catch (error) {
          ui.loginError.textContent = error instanceof Error ? error.message : t.loginFailed;
        }
      });

      ui.guestLoginBtn.addEventListener("click", () => {
        continueAsGuest();
      });

      ui.logoutBtn.addEventListener("click", async () => {
        try { await api("/auth/logout", "POST"); } catch {}
        state.user = null;
        state.adminVisible = false;
        stopAdminAutoRefresh();
        state.users = [];
        state.events = [];
        state.insights = null;
        state.analyticsSummary = null;
        state.analyticsTimeseries = [];
        state.analyticsError = "";
        state.aiStatus = null;
        renderStaticText();
        renderPortal();
        setScreen("welcome");
      });

      ui.adminToggleBtn.addEventListener("click", () => {
        toggleAdminSection().catch((error) => {
          alert(error instanceof Error ? error.message : "Admin toggle failed");
        });
      });

      ui.adminSection.addEventListener("input", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.id === "accountsSearch") {
          state.accountsQuery = target.value;
          renderAdminSection();
          return;
        }
        if (target.id === "adminAnalyticsFrom" || target.id === "adminAnalyticsTo") {
          if (target.id === "adminAnalyticsFrom") state.analyticsDateFrom = target.value;
          if (target.id === "adminAnalyticsTo") state.analyticsDateTo = target.value;
          loadAdminData().catch(() => {});
          return;
        }
        const uid = target.getAttribute("data-user-id");
        const field = target.getAttribute("data-account-field");
        if (!uid || !field) return;
        updateAccountField(uid, field, target.value);
      });

      ui.adminSection.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const button = target.closest("button");
        if (!button) return;

        const panelToggle = button.getAttribute("data-panel-toggle");
        if (panelToggle === "storage") {
          const nextValue = !state.storageExpanded;
          state.storageExpanded = nextValue;
          state.securityExpanded = false;
          renderAdminSection();
          return;
        }
        if (panelToggle === "security") {
          const nextValue = !state.securityExpanded;
          state.securityExpanded = nextValue;
          state.storageExpanded = false;
          renderAdminSection();
          return;
        }

        const aiAction = button.getAttribute("data-ai-action");
        if (aiAction) {
          await runAiAction(aiAction);
          return;
        }

        const analyticsExport = button.getAttribute("data-analytics-export");
        if (analyticsExport) {
          try {
            ensureAnalyticsRange();
            const query = new URLSearchParams({
              date_from: state.analyticsDateFrom,
              date_to: state.analyticsDateTo,
              export_format: analyticsExport
            }).toString();
            const response = await fetch(`${APP_API}/admin/analytics/export?${query}`, { credentials: "same-origin" });
            if (!response.ok) throw new Error(getCopy().analyticsExportFailed);
            const blob = await response.blob();
            const href = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = href;
            link.download = analyticsExport === "csv"
              ? `aibox-analytics-${state.analyticsDateFrom}-to-${state.analyticsDateTo}.csv`
              : `aibox-analytics-${state.analyticsDateFrom}-to-${state.analyticsDateTo}.json`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(href);
          } catch (error) {
            alert(error instanceof Error ? error.message : getCopy().analyticsExportFailed);
          }
          return;
        }

        const uid = button.getAttribute("data-user-id");
        if (!uid) return;
        const panel = button.getAttribute("data-account-panel");
        if (panel) {
          const view = getAccountUi(uid);
          view.pendingDelete = false;
          clearTimeout(deleteTimers[uid]);
          delete deleteTimers[uid];
          view.panel = view.panel === panel ? null : panel;
          renderAdminSection();
          return;
        }
        if (button.hasAttribute("data-account-delete-toggle")) {
          const view = getAccountUi(uid);
          view.panel = null;
          view.pendingDelete = true;
          renderAdminSection();
          clearTimeout(deleteTimers[uid]);
          deleteTimers[uid] = setTimeout(() => {
            const v = getAccountUi(uid);
            if (v.pendingDelete) {
              v.pendingDelete = false;
              renderAdminSection();
            }
          }, 5000);
          return;
        }
        if (button.hasAttribute("data-account-delete-confirm")) {
          clearTimeout(deleteTimers[uid]);
          delete deleteTimers[uid];
          await handleDelete(uid);
          return;
        }
        const submitAction = button.getAttribute("data-account-submit");
        if (submitAction) {
          await handleAccountSubmit(uid, submitAction);
        }
      });

      ui.portalSection.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const card = target.closest(".portal-tool-card");
        if (!card) return;
        postAnalyticsEvent("portal_tool_open", "portal", {
          tool_id: card.getAttribute("data-tool-id") || "unknown",
          href: card.getAttribute("href") || ""
        });
      });

      // ── Backend loading screen ────────────────────────────
      (function () {
        var _loadStart = 0;
        var _loadTimer = null;
        var _continueShownAt = 0;
        var _hardCapMs = 180000;     // auto-dismiss after 3 minutes
        var _continueAfterMs = 60000; // offer "Continue anyway" after 60s
        var _hintAfterMs = 25000;    // surface status_reason after 25s
        var _settled = false;

        var STATUS_REASON_HINTS = {
          startup_in_progress: "Backend is starting up...",
          llama_unhealthy: "AI model is warming up — this can take a minute on first boot.",
          llama_container_not_found: "AI runtime container is not running.",
          gpu_not_attached: "Waiting for GPU to attach to the AI runtime.",
          startup_rag_unready: "Search index is loading...",
          shutdown_in_progress: "Backend is shutting down.",
          manual_forced_off: "AI is manually disabled — portal still usable.",
          startup_failed: "Backend reported a startup error — see admin diagnostics.",
        };

        function _hintFor(payload) {
          if (!payload) return "";
          var reason = payload.status_reason || "";
          if (STATUS_REASON_HINTS[reason]) return STATUS_REASON_HINTS[reason];
          if (reason && reason.indexOf("rag") !== -1) {
            return "Search index not ready: " + reason;
          }
          return reason ? ("Status: " + reason) : "";
        }

        function _loadPct(elapsedMs) {
          var t = elapsedMs / 1000;
          return Math.min(Math.round(5 + 83 * (1 - Math.exp(-t / 35))), 90);
        }

        function _tickProgress() {
          var elapsed = Date.now() - _loadStart;
          var pct = _loadPct(elapsed);
          var fill = document.getElementById("loadingProgressFill");
          var lbl  = document.getElementById("loadingPct");
          if (fill) fill.style.width = pct + "%";
          if (lbl)  lbl.textContent  = pct + "%";
          if (elapsed >= _continueAfterMs && !_continueShownAt) {
            _continueShownAt = Date.now();
            var btn = document.getElementById("loadingContinueBtn");
            if (btn) btn.style.display = "inline-block";
          }
          if (elapsed >= _hardCapMs && !_settled) {
            _settled = true;
            _forceContinue("timeout");
          }
        }

        function showLoadingOverlay() {
          var el = document.getElementById("loading-overlay");
          if (!el) return;
          _loadStart = Date.now();
          _continueShownAt = 0;
          _settled = false;
          var btn = document.getElementById("loadingContinueBtn");
          if (btn) btn.style.display = "none";
          var hint = document.getElementById("loadingHint");
          if (hint) hint.textContent = "";
          el.style.display = "flex";
          _tickProgress();
          _loadTimer = setInterval(_tickProgress, 500);
        }

        function hideLoadingOverlay() {
          var el = document.getElementById("loading-overlay");
          if (!el) return;
          clearInterval(_loadTimer);
          _loadTimer = null;
          var fill = document.getElementById("loadingProgressFill");
          var lbl  = document.getElementById("loadingPct");
          if (fill) fill.style.width = "100%";
          if (lbl)  lbl.textContent  = "100%";
          setTimeout(function () { el.style.display = "none"; }, 600);
        }

        async function fetchBackendStatus() {
          // Read /ai/api/health regardless of HTTP status — the 503 body still
          // carries portal_ok, readiness_ok, and status_reason.
          try {
            var res = await fetch("/ai/api/health", { cache: "no-store" });
            var data = await res.json().catch(function () { return null; });
            return {
              ok: res.ok,
              status: res.status,
              data: data,
              reachable: true,
            };
          } catch (_) {
            return { ok: false, status: 0, data: null, reachable: false };
          }
        }

        function _isPortalReady(snap) {
          if (!snap || !snap.reachable || !snap.data) return false;
          var d = snap.data;
          // Prefer portal_ok (process up + storage mounted). Fall back to
          // readiness_ok for older backends, then liveness_ok as last resort.
          if (d.portal_ok === true) return true;
          if (d.readiness_ok === true) return true;
          if (d.portal_ok === undefined && d.readiness_ok === undefined && d.liveness_ok === true) return true;
          return false;
        }

        var _onReadyCallback = null;
        function _forceContinue(reason) {
          if (_loadTimer) { clearInterval(_loadTimer); _loadTimer = null; }
          var hint = document.getElementById("loadingHint");
          if (hint && reason === "timeout") {
            hint.textContent = "Backend slow to respond — entering portal in degraded mode.";
          }
          hideLoadingOverlay();
          if (_onReadyCallback) {
            var cb = _onReadyCallback;
            _onReadyCallback = null;
            setTimeout(cb, 650);
          }
        }

        async function pollUntilReady(onReady) {
          _onReadyCallback = onReady;
          var snap = await fetchBackendStatus();
          if (_isPortalReady(snap)) { _onReadyCallback = null; onReady(); return; }
          showLoadingOverlay();
          var btn = document.getElementById("loadingContinueBtn");
          if (btn) {
            btn.onclick = function () {
              if (_settled) return;
              _settled = true;
              _forceContinue("user");
            };
          }
          (async function poll() {
            if (_settled) return;
            var s = await fetchBackendStatus();
            if (_isPortalReady(s)) {
              _settled = true;
              _onReadyCallback = onReady;
              _forceContinue("ready");
              return;
            }
            var hint = document.getElementById("loadingHint");
            if (hint && (Date.now() - _loadStart) >= _hintAfterMs) {
              hint.textContent = s.reachable ? _hintFor(s.data) : "Backend unreachable — retrying...";
            }
            setTimeout(poll, 3000);
          })();
        }

        window._waitForBackend = pollUntilReady;
      })();

      readLocalPreferences();
      applyTheme(state.theme || "light");
      renderStaticText();
      setScreen("welcome");
      window._waitForBackend(refreshSession);
    </script>
  </body>
</html>
