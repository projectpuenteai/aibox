<!-- Main signed-in AI chat client. This page talks to /ai/api/v1/app and renders diagnostics for admins. -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Puente AI Chat</title>
  <style>
    :root { --bg:#f2f6fb; --bg-soft:#f8fbff; --panel:#fff; --panel-soft:#fbfdff; --panel-elevated:#fff; --text:#162235; --text-secondary:#44546a; --muted:#5e6b7e; --line:#d4ddea; --accent:#1f6fd1; --accent-soft:#e8f1ff; --accent-strong:#195eb3; --user-bubble:#e8f1ff; --user-bubble-line:#bfd4f4; --assistant-avatar:#1f6fd1; --warn:#a15b06; --danger:#b42318; --shadow:0 18px 38px rgba(17,32,56,.12); --sidebar-bg:#eef4ff; --sidebar-text:#162235; --sidebar-muted:#60708a; --sidebar-hover:#e0eaf8; --sidebar-active:#d4e3f9; --sidebar-active-text:#162235; --sidebar-line:#cdd9ea; --sidebar-width:280px; --msg-max-width:820px; --transition-speed:180ms; }
    html.dark { --bg:#17212f; --bg-soft:#1c2738; --panel:#1a2432; --panel-soft:#212d40; --panel-elevated:#223146; --text:#ececec; --text-secondary:#ccd6e3; --muted:#9eacbf; --line:#33455f; --accent:#6b9fff; --accent-soft:#1e2a3a; --accent-strong:#86b1ff; --user-bubble:#233754; --user-bubble-line:#38557f; --assistant-avatar:#6b9fff; --warn:#f59e0b; --danger:#f87171; --shadow:0 2px 12px rgba(0,0,0,.3); --sidebar-bg:#101720; --sidebar-text:#eef4ff; --sidebar-muted:#9fb0c7; --sidebar-hover:#1b2635; --sidebar-active:#26364f; --sidebar-active-text:#ffffff; --sidebar-line:#25354d; }
    * { box-sizing:border-box; }
    body { margin:0; height:100vh; overflow:hidden; font:15px/1.6 "Segoe UI",Tahoma,sans-serif; color:var(--text); background:var(--bg); }
    .layout { display:flex; height:100vh; }
    .sidebar-overlay { display:none; }
    .panel { background:var(--panel); border:none; overflow:hidden; }
    .sidebar { width:var(--sidebar-width); min-width:var(--sidebar-width); max-width:var(--sidebar-width); height:100vh; display:flex; flex-direction:column; background:var(--sidebar-bg); color:var(--sidebar-text); transition:margin-left var(--transition-speed) ease,opacity var(--transition-speed) ease; z-index:20; }
    .sidebar.collapsed { margin-left:calc(-1 * var(--sidebar-width)); opacity:0; pointer-events:none; }
    .main { flex:1; min-width:0; height:100vh; display:grid; grid-template-rows:auto 1fr auto auto; overflow:hidden; }
    .sidebar .head { display:flex; align-items:center; justify-content:flex-start; gap:8px; padding:12px 14px; border-bottom:1px solid var(--sidebar-line); }
    .sidebar .head h2,.section-head h3,.head h1,.head h2 { margin:0; }
    .sidebar .head h2 { font-size:14px; font-weight:600; color:var(--sidebar-text); }
    .row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .meta { color:var(--muted); font-size:12px; }
    .section-head h3 { color:var(--sidebar-text); }
    .scope-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; padding:10px 14px 6px; }
    .scope-btn,.btn,.folder-btn,.folder-menu-btn,.chat-item,.chat-menu-btn,.theme-toggle,.sidebar-toggle-btn,.send-btn,.diagnostics-toggle,.welcome-suggestion { appearance:none; }
    .scope-btn { border:1px solid var(--sidebar-line); border-radius:10px; background:transparent; color:var(--sidebar-muted); cursor:pointer; font-size:12px; font-weight:600; padding:7px 8px; }
    .scope-btn:hover { background:var(--sidebar-hover); color:var(--sidebar-text); }
    .scope-btn.active { background:var(--sidebar-active); color:var(--sidebar-active-text); border-color:var(--sidebar-active); }
    .sidebar-section { padding:8px 0 10px; border-bottom:1px solid var(--sidebar-line); margin:0 14px 8px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .section-head h3 { font-size:15px; font-weight:700; }
    .section-add-btn { appearance:none; background:transparent; border:1px solid var(--sidebar-line); border-radius:8px; color:var(--sidebar-muted); cursor:pointer; font-size:18px; font-weight:400; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; padding:0; line-height:1; }
    .section-add-btn:hover { background:var(--sidebar-hover); color:var(--sidebar-text); border-color:var(--sidebar-active); }
    .folder-list,.chats,.menu-list,.popover-stack,.popover-form,.diag-subsection,.diag-table,.diag-chunk-list,.composer-shell,.diagnostics-dock { display:grid; }
    .folder-list,.chats { gap:4px; }
    .sidebar-divider { height:1px; margin:0 14px 10px; background:var(--sidebar-line); }
    .chats { padding:4px 14px 14px; overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:rgba(191,212,244,.28) transparent; align-content:start; }
    .chats::-webkit-scrollbar { width:6px; } .chats::-webkit-scrollbar-thumb { background:rgba(191,212,244,.28); border-radius:3px; }
    .chat-empty { color:var(--sidebar-muted); font-size:13px; padding:12px; border:1px dashed var(--sidebar-line); border-radius:12px; }
    .chat-empty.compact { padding:8px; font-size:12px; }
    .folder-row,.chat-row { display:grid; grid-template-columns:1fr auto; gap:4px; align-items:stretch; }
    .folder-btn,.folder-menu-btn,.chat-item,.chat-menu-btn { border:none; border-radius:12px; background:transparent; color:var(--sidebar-text); }
    .folder-btn { width:100%; text-align:left; padding:10px 12px; cursor:pointer; display:flex; align-items:center; }
    .chat-item { width:100%; text-align:left; padding:10px 12px; cursor:pointer; }
    .folder-btn.create-item,.chat-item.create-item { border:1px dashed var(--sidebar-line); background:transparent; color:var(--sidebar-muted); font-weight:600; }
    .folder-btn.create-item:hover,.chat-item.create-item:hover { border-color:var(--sidebar-active); background:var(--sidebar-hover); color:var(--sidebar-text); }
    .folder-btn:hover,.chat-item:hover,.folder-menu-btn:hover,.chat-menu-btn:hover,.folder-menu-btn[aria-expanded="true"],.chat-menu-btn[aria-expanded="true"],.sidebar .btn:hover,.theme-toggle:hover { background:var(--sidebar-hover); color:var(--sidebar-text); }
    .folder-btn.active,.folder-row.active .folder-menu-btn,.chat-item.active,.chat-row.active .chat-menu-btn,.scope-btn.active { background:var(--sidebar-active); color:var(--sidebar-active-text); }
    .folder-menu-btn,.chat-menu-btn { min-width:36px; padding:0 10px; font-weight:700; color:var(--sidebar-muted); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
    .chat-item-head { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; }
    .chat-item p { margin:0; font-size:13px; font-weight:500; }
    .chat-item .meta { margin-top:2px; font-size:11px; color:var(--sidebar-muted); }
    .chat-pills,.diag-chip-row,.diag-actions,.popover-actions { display:flex; flex-wrap:wrap; gap:6px; }
    .chat-pills { justify-content:flex-end; gap:4px; }
    .chat-pill,.diag-chip { border-radius:999px; padding:2px 8px; font-size:11px; font-weight:600; }
    .chat-pill { background:rgba(191,212,244,.14); color:var(--sidebar-text); font-size:10px; padding:2px 6px; }
    .chat-pill.trash { background:rgba(248,113,113,.16); color:#fecaca; }
    .head { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 18px; min-height:62px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.88); backdrop-filter:blur(14px); }
    html.dark .head { background:rgba(26,36,50,.92); }
    .head h1 { font-size:18px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sidebar-toggle-btn { border:none; background:transparent; color:var(--text); cursor:pointer; padding:6px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .sidebar-toggle-btn:hover { background:var(--bg-soft); }
    .sidebar-toggle-btn svg,.send-btn svg { width:18px; height:18px; }
    .btn { border:1px solid var(--line); border-radius:10px; padding:6px 12px; font-size:13px; font-weight:600; cursor:pointer; background:var(--panel-soft); color:var(--text); text-decoration:none; transition:background 120ms,border-color 120ms,color 120ms; }
    .btn:hover,.menu-item:hover,.menu-item:focus-visible,.welcome-suggestion:hover { background:var(--accent-soft); border-color:var(--accent); color:var(--accent-strong); outline:none; }
    .btn:disabled,.send-btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn:focus-visible,.menu-item:focus-visible,.popover-field:focus-visible,.thinking-toggle:focus-visible,.send-btn:focus-visible,.sidebar-toggle-btn:focus-visible,.theme-toggle:focus-visible,.folder-btn:focus-visible,.folder-menu-btn:focus-visible,.chat-item:focus-visible,.chat-menu-btn:focus-visible,.diagnostics-toggle:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .btn.primary,.thinking-toggle.active,.send-btn { background:var(--accent); color:#fff; border-color:var(--accent); } .btn.primary:hover,.thinking-toggle.active:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.danger,.menu-item.danger { color:var(--danger); }
    .sidebar .btn,.theme-toggle { background:var(--sidebar-hover); color:var(--sidebar-text); border:1px solid var(--sidebar-line); font-size:12px; padding:6px 10px; } .sidebar .btn:hover,.theme-toggle:hover { background:var(--sidebar-active); color:var(--sidebar-text); border-color:var(--sidebar-active); }
    .head-actions { justify-content:flex-end; gap:10px; }
    .home-btn { width:100%; min-height:42px; padding:10px 14px; border-radius:14px; font-size:13px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; background:var(--accent); color:#fff; border:1px solid var(--accent); box-shadow:none; }
    .home-btn:hover { background:var(--accent-strong); color:#fff; border-color:var(--accent-strong); }
    .icon-btn { width:40px; height:40px; border-radius:12px; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .icon-btn svg,.avatar-logo { width:20px; height:20px; }
    .messages { padding:0; overflow-y:auto; display:flex; flex-direction:column; background:linear-gradient(180deg,#f8fbff 0%,var(--panel) 28%); }
    html.dark .messages { background:linear-gradient(180deg,#1f2b3d 0%,var(--panel) 28%); }
    .messages .chat-empty { max-width:var(--msg-max-width); margin:auto; padding:40px 20px; text-align:center; border:none; background:transparent; color:var(--text-secondary); font-size:15px; }
    .msg-row { width:100%; display:flex; justify-content:center; }
    .msg-row.user-row { justify-content:center; }
    .msg-inner { width:100%; max-width:var(--msg-max-width); padding:18px 24px; display:flex; gap:16px; align-items:flex-start; }
    .msg-row.user-row .msg-inner { max-width:var(--msg-max-width); padding-top:10px; padding-bottom:10px; justify-content:flex-end; }
    .msg-avatar { width:32px; height:32px; min-width:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; margin-top:2px; overflow:hidden; }
    .msg-avatar.user-avatar { display:none; }
    .msg-avatar.ai-avatar,.welcome-icon { background:var(--panel-elevated); color:#fff; }
    .msg-body { flex:1; min-width:0; word-break:break-word; }
    .msg-body.user-body { white-space:pre-wrap; line-height:1.6; flex:0 0 auto; width:fit-content; max-width:min(100%,560px); padding:12px 16px; border:1px solid var(--user-bubble-line); border-radius:20px; background:var(--user-bubble); color:var(--text); box-shadow:0 10px 24px rgba(31,111,209,.08); overflow-wrap:anywhere; }
    .msg-body.ai-body { white-space:normal; line-height:1.7; }
    .msg-body.ai-body p,.msg-body.ai-body ul,.msg-body.ai-body ol,.msg-body.ai-body pre,.msg-body.ai-body blockquote { margin:0 0 .75em; }
    .msg-body.ai-body > :last-child { margin-bottom:0; }
    .msg-citations { margin-top:.9rem; padding-top:.7rem; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .msg-citations-label { font-size:12px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:var(--text-secondary); }
    .msg-citation-link { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--accent-strong); text-decoration:none; border:1px solid var(--line); background:var(--panel-soft); border-radius:999px; padding:6px 10px; }
    .msg-citation-link:hover,.msg-citation-link:focus-visible { border-color:var(--accent); background:var(--accent-soft); outline:none; }
    .msg-body.ai-body code { font-family:"SFMono-Regular",Consolas,"Courier New",monospace; font-size:.875em; background:rgba(0,0,0,.06); border-radius:4px; padding:.15em .4em; }
    html.dark .msg-body.ai-body code { background:rgba(255,255,255,.1); }
    .msg-body.ai-body pre,.diag-code { overflow:auto; border:1px solid var(--line); border-radius:12px; background:var(--panel-soft); }
    .msg-body.ai-body pre { padding:14px 16px; font-size:13px; }
    .msg-body.ai-body pre code { display:block; padding:0; background:transparent; border-radius:0; }
    .msg-body.ai-body mjx-container { margin:.2em 0; overflow-x:auto; max-width:100%; }
    .msg-body.ai-body mjx-container[display="true"] { margin:.8em 0; padding:.1em 0; }
    .msg-body.streaming { position:relative; }
    .msg-body.streaming::after { content:""; display:inline-block; width:7px; height:1em; margin-left:2px; background:var(--accent); border-radius:2px; vertical-align:-.1em; animation:blink 1s steps(1,end) infinite; }
    .composer-wrap { padding:0 16px 18px; background:var(--panel); display:flex; justify-content:center; }
    .composer-shell { width:100%; max-width:var(--msg-max-width); gap:10px; }
    .composer { width:100%; border:1px solid var(--line); border-radius:20px; background:var(--panel-elevated); display:flex; align-items:center; gap:8px; padding:6px 6px 6px 14px; box-shadow:0 18px 34px rgba(17,32,56,.08); }
    .composer:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px rgba(31,111,209,.15),0 18px 34px rgba(17,32,56,.08); }
    html.dark .composer:focus-within { box-shadow:0 0 0 2px rgba(107,159,255,.15),0 18px 34px rgba(0,0,0,.2); }
    .input { flex:1; min-height:22px; max-height:200px; border:none; background:transparent; padding:8px 0 7px; font:inherit; font-size:15px; color:var(--text); resize:none; outline:none; line-height:1.4; }
    .input::placeholder { color:var(--muted); }
    .composer-actions { display:flex; align-items:center; justify-content:flex-end; gap:8px; flex-wrap:nowrap; }
    .char-counter { font-size:11px; color:var(--muted); text-align:right; padding:2px 8px 0; transition:color 120ms ease; }
    .char-counter.near-limit { color:var(--warn,#d97706); }
    .char-counter.over-limit { color:var(--danger,#dc2626); font-weight:600; }
    .thinking-toggle { width:40px; height:40px; min-height:40px; border-radius:14px; padding:0; background:var(--panel-soft); box-shadow:none; display:inline-flex; align-items:center; justify-content:center; color:var(--muted); }
    .thinking-toggle:hover { color:var(--accent-strong); }
    .thinking-toggle svg { width:18px; height:18px; }
    .send-btn { width:40px; height:40px; border:none; border-radius:14px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 12px 24px rgba(31,111,209,.24); transition:background 120ms ease,transform 120ms ease,box-shadow 120ms ease; }
    .send-btn:hover { background:var(--accent-strong); transform:translateY(-1px); }
    .status { min-height:28px; padding:6px 20px; color:var(--muted); font-size:12px; background:var(--panel); }
    .status.warn { color:var(--warn); } .status.err { color:var(--danger); }
    .diagnostics-dock { border-top:1px solid var(--line); background:var(--panel-soft); }
    .diagnostics-toggle { width:100%; border:none; background:transparent; color:var(--text); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; cursor:pointer; font:700 13px "Segoe UI",Tahoma,sans-serif; text-align:left; }
    .diagnostics-toggle .meta { color:var(--muted); font-size:12px; } .diagnostics-toggle::after { content:"\\25BE"; font-size:14px; color:var(--muted); transition:transform 120ms ease; } .diagnostics-dock.collapsed .diagnostics-toggle::after { transform:rotate(-90deg); }
    .diagnostics { border-top:1px solid var(--line); padding:12px 16px 16px; font-size:12px; color:var(--muted); background:var(--bg-soft); gap:10px; max-height:60vh; overflow-y:auto; }
    .diag-summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .diag-item,.diag-note,.diag-details,.diag-kv,.diag-chunk { border:1px solid var(--line); border-radius:10px; background:var(--panel); }
    .diag-item { padding:8px 10px; min-height:52px; } .diag-note,.diag-details-body { padding:10px 12px; } .diag-kv,.diag-chunk { padding:8px 10px; }
    .diag-item.warn { border-color:#fbbf24; background:#fffbeb; } .diag-item.error { border-color:#f87171; background:#fef2f2; } .diag-item.fallback { border-color:#c084fc; background:#faf5ff; }
    html.dark .diag-item.warn { background:#2a2008; border-color:#92400e; } html.dark .diag-item.error { background:#2a0808; border-color:#991b1b; } html.dark .diag-item.fallback { background:#1e0a2e; border-color:#6b21a8; }
    .diag-item strong,.diagnostics .label { display:block; color:var(--text); margin-bottom:2px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
    .diag-item .value,.diag-kv-value,.diag-chunk p,.diag-chunk .meta,.diag-meta-line { white-space:pre-wrap; word-break:break-word; line-height:1.45; }
    .diag-toolbar { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .diag-chip { border:1px solid var(--line); background:var(--panel); color:var(--text); } .diag-chip.ok { background:#dcfce7; border-color:#86efac; color:#166534; } .diag-chip.warn { background:#fef3c7; border-color:#fcd34d; color:#92400e; } .diag-chip.error { background:#fef2f2; border-color:#fca5a5; color:#991b1b; } .diag-chip.fallback,.diag-chip.skipped { background:#f3e8ff; border-color:#d8b4fe; color:#7c3aed; }
    html.dark .diag-chip.ok { background:#052e16; border-color:#166534; color:#86efac; } html.dark .diag-chip.warn { background:#2a2008; border-color:#92400e; color:#fcd34d; } html.dark .diag-chip.error { background:#2a0808; border-color:#991b1b; color:#fca5a5; } html.dark .diag-chip.fallback,html.dark .diag-chip.skipped { background:#1e0a2e; border-color:#6b21a8; color:#d8b4fe; }
    .diag-details > summary { list-style:none; cursor:pointer; padding:10px 12px; font-weight:600; font-size:12px; color:var(--text); background:var(--bg-soft); } .diag-details > summary::-webkit-details-marker { display:none; }
    .diag-table,.diag-actions,.diag-details-body,.diag-chunk,.diag-note { gap:8px; }
    .diag-kv { display:grid; grid-template-columns:minmax(160px,200px) 1fr; gap:8px; }
    .diag-kv-label { font-weight:600; color:var(--text); font-size:12px; }
    .diag-code { margin:0; padding:10px; color:var(--text); font-family:"SFMono-Regular",Consolas,monospace; font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:360px; }
    .diag-chunk-head { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; flex-wrap:wrap; }
    .diag-chunk-flags { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
    .popover { position:fixed; z-index:120; min-width:220px; max-width:min(360px,calc(100vw - 24px)); border:1px solid var(--line); border-radius:16px; background:var(--panel-elevated); box-shadow:var(--shadow); padding:10px; }
    .popover-title { margin:0 0 4px; font-size:14px; font-weight:700; color:var(--text); } .popover-copy { margin:0; color:var(--muted); font-size:12px; line-height:1.45; }
    .menu-list,.popover-stack,.popover-form,.popover-choice-list { gap:10px; }
    .menu-item { width:100%; border:1px solid transparent; border-radius:12px; background:transparent; color:var(--text); text-align:left; padding:9px 11px; font:600 13px "Segoe UI",Tahoma,sans-serif; cursor:pointer; }
    .popover-field { width:100%; min-height:40px; border:1px solid var(--line); border-radius:12px; padding:9px 11px; background:var(--panel-soft); color:var(--text); font:14px "Segoe UI",Tahoma,sans-serif; }
    .popover-actions { justify-content:flex-end; } .popover-choice-list { max-height:min(240px,42vh); overflow:auto; padding-right:2px; } .popover-choice { width:100%; display:flex; justify-content:flex-start; }
    .sidebar-footer { display:none; }
    .theme-toggle { border-radius:12px; font-size:16px; }
    @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes thinkingPulse { 0%,80%,100% { opacity:.25; transform:translateY(0); } 40% { opacity:1; transform:translateY(-2px); } }
    .thinking-row { width:100%; display:flex; justify-content:center; }
    .thinking-inner { width:100%; max-width:var(--msg-max-width); padding:16px 24px; display:flex; align-items:center; gap:16px; }
    .thinking-pill { display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border:1px solid var(--line); border-radius:999px; background:var(--panel-soft); color:var(--text-secondary); font-weight:600; }
    .thinking-dots { display:inline-flex; align-items:center; gap:4px; }
    .thinking-dots span { width:6px; height:6px; border-radius:999px; background:var(--accent); animation:thinkingPulse 1s infinite ease-in-out; }
    .thinking-dots span:nth-child(2) { animation-delay:.15s; }
    .thinking-dots span:nth-child(3) { animation-delay:.3s; }
    .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px 24px; text-align:center; color:var(--text-secondary); max-width:var(--msg-max-width); margin:0 auto; }
    .welcome-icon { width:64px; height:64px; border-radius:18px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; background:var(--panel-elevated); box-shadow:0 12px 30px rgba(31,111,209,.16); overflow:hidden; }
    .avatar-logo { width:100%; height:100%; object-fit:cover; display:block; }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function escapeRegExp(value) {
      return String(value ?? "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function protectSegments(source, pattern, prefix) {
      const segments = [];
      const text = String(source ?? "").replace(pattern, match => {
        const token = `${prefix}${segments.length}X`;
        segments.push({ token, value: match });
        return token;
      });
      return { text, segments };
    }

    function restoreSegments(source, segments, formatter = entry => entry.value) {
      let restored = String(source ?? "");
      for (const entry of segments) {
        restored = restored.replace(new RegExp(escapeRegExp(entry.token), "g"), formatter(entry));
      }
      return restored;
    }

    function isEscaped(value, index) {
      let slashCount = 0;
      for (let i = index - 1; i >= 0 && value[i] === "\\"; i -= 1) {
        slashCount += 1;
      }
      return slashCount % 2 === 1;
    }

    function findClosingInlineDollar(source, startIndex) {
      let cursor = startIndex + 1;
      while (cursor < source.length) {
        const char = source[cursor];
        if (char === "\n" || char === "\r") return -1;
        if (char === "$" && !isEscaped(source, cursor)) {
          const inner = source.slice(startIndex + 1, cursor);
          if (!inner.trim() || /\s$/.test(inner)) {
            cursor += 1;
            continue;
          }
          const prev = source[cursor - 1] || "";
          const next = source[cursor + 1] || "";
          if (/\d/.test(prev) && /\d/.test(next)) {
            cursor += 1;
            continue;
          }
          return cursor;
        }
        cursor += 1;
      }
      return -1;
    }

    function findClosingDelimiter(source, startIndex, open, close, allowMultiline = true) {
      let cursor = startIndex + open.length;
      while (cursor < source.length) {
        const char = source[cursor];
        if (!allowMultiline && (char === "\n" || char === "\r")) return -1;
        if (source.startsWith(close, cursor) && !isEscaped(source, cursor)) {
          return cursor;
        }
        cursor += 1;
      }
      return -1;
    }

    function extractMathSegments(source) {
      const input = String(source ?? "");
      const segments = [];
      let output = "";
      let index = 0;

      while (index < input.length) {
        let raw = "";

        if (input.startsWith("$$", index) && !isEscaped(input, index)) {
          const closeIndex = findClosingDelimiter(input, index, "$$", "$$");
          raw = closeIndex >= 0 ? input.slice(index, closeIndex + 2) : "";
        } else if (input.startsWith("\\[", index)) {
          const closeIndex = findClosingDelimiter(input, index, "\\[", "\\]");
          raw = closeIndex >= 0 ? input.slice(index, closeIndex + 2) : "";
        } else if (input.startsWith("\\(", index)) {
          const closeIndex = findClosingDelimiter(input, index, "\\(", "\\)");
          raw = closeIndex >= 0 ? input.slice(index, closeIndex + 2) : "";
        } else if (
          input[index] === "$" &&
          !isEscaped(input, index) &&
          !input.startsWith("$$", index) &&
          !/\s/.test(input[index + 1] || "") &&
          !(/\d/.test(input[index - 1] || "") && /\d/.test(input[index + 1] || ""))
        ) {
          const closeIndex = findClosingInlineDollar(input, index);
          raw = closeIndex >= 0 ? input.slice(index, closeIndex + 1) : "";
        }

        if (raw) {
          const token = `${MATH_PLACEHOLDER_PREFIX}${segments.length}X`;
          segments.push({ token, value: raw });
          output += token;
          index += raw.length;
          continue;
        }

        output += input[index];
        index += 1;
      }

      return { text: output, segments };
    }

    function sanitizeHtml(html) {
      return window.DOMPurify && typeof window.DOMPurify.sanitize === "function"
        ? window.DOMPurify.sanitize(html)
        : html;
    }

    function renderAssistantContent(content) {
      const raw = String(content ?? "");
      const codeProtected = protectSegments(raw, /(```[\s\S]*?```|~~~[\s\S]*?~~~|`[^`\n]*`)/g, CODE_PLACEHOLDER_PREFIX);
      const mathProtected = extractMathSegments(codeProtected.text);
      const markdownSource = restoreSegments(mathProtected.text, codeProtected.segments);
      const rendered = md
        ? md.render(markdownSource)
        : `<p>${escapeHtml(markdownSource).replace(/\n/g, "<br>")}</p>`;
      const sanitized = sanitizeHtml(rendered);
      return {
        html: restoreSegments(sanitized, mathProtected.segments, entry => escapeHtml(entry.value)),
        hasMath: mathProtected.segments.length > 0
      };
    }

    function queueMathTypeset(delay = 0) {
      if (mathTypesetTimer !== null) {
        window.clearTimeout(mathTypesetTimer);
      }
      const runId = ++mathTypesetRunId;
      mathTypesetTimer = window.setTimeout(() => {
        mathTypesetQueue = mathTypesetQueue
          .then(() => typesetPendingMath(runId))
          .catch(error => {
            console.warn("Math typeset failed", error);
          });
      }, delay);
    }

    async function typesetPendingMath(runId) {
      const mathJax = window.MathJax;
      if (!mathJax || typeof mathJax.typesetPromise !== "function" || !mathJax.startup?.promise) {
        return;
      }

      await mathJax.startup.promise;
      if (runId !== mathTypesetRunId) return;

      const targets = Array.from(ui.messages.querySelectorAll(".msg.ai[data-math-pending='true']"))
        .filter(node => node instanceof HTMLElement && node.isConnected);
      if (!targets.length) return;

      if (typeof mathJax.typesetClear === "function") {
        mathJax.typesetClear(targets);
      }
      await mathJax.typesetPromise(targets);
      if (runId !== mathTypesetRunId) return;

      for (const target of targets) {
        target.removeAttribute("data-math-pending");
        const messageIndex = Number(target.getAttribute("data-message-index"));
        const message = Number.isInteger(messageIndex) ? state.activeChatMessages[messageIndex] : null;
        if (message && !message.streaming) {
          message.renderedHtmlCache = target.innerHTML;
        }
      }

      scrollMessages();
    }

      const rendered = renderAssistantContent(String(message.content || ""));
      const citationsHtml = renderMessageCitations(message);
      body.innerHTML = rendered.html + citationsHtml;

      if (rendered.hasMath) {

    function formatBool(value) {

    function formatBytes(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return text("na");
      if (num < 1024) return `${Math.round(num)} B`;
      if (num < 1024 * 1024) return `${(num / 1024).toFixed(1)} KB`;
      if (num < 1024 * 1024 * 1024) return `${(num / (1024 * 1024)).toFixed(1)} MB`;
      return `${(num / (1024 * 1024 * 1024)).toFixed(2)} GB`;
    }

    function formatList(value) {
      if (!Array.isArray(value) || !value.length) return text("none");

      if (format === "bytes") return formatBytes(value);
      if (format === "bool") return formatBool(value);
      if (format === "json") return JSON.stringify(value ?? null, null, 2);
      if (format === "list") return formatList(value);
      if (value === null || value === undefined || value === "") return text("na");
      return String(value);
    }

    function redactDiagnosticsForExport(value) {
      const redactKeys = new Set(["user_id", "raw_user_message", "normalized_user_message", "assembled_prompt_preview", "retrieval_query", "final_prompt_with_chunk_injection"]);
      const redactContentKeys = new Set(["content"]);
      const visit = (node, key = "") => {
        if (Array.isArray(node)) return node.map(item => visit(item, key));
        if (node && typeof node === "object") {
          const out = {};
          for (const [childKey, childValue] of Object.entries(node)) {
            if (redactKeys.has(childKey)) out[childKey] = "[redacted]";
            else if (redactContentKeys.has(childKey) && typeof childValue === "string") out[childKey] = "[redacted]";
            else out[childKey] = visit(childValue, childKey);
          }
          return out;
        }
        if (key === "preview" && typeof node === "string") return node.length > 120 ? `${node.slice(0, 120)}...` : node;
        return node;
      };
      return visit(cloneData(value));
    }

    async function copyDiagnosticsText(content, successMessage) {
      const value = String(content || "");
      if (!value) {
        setStatus(text("nothingToCopy"), "warn");
        return;
      }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
        } else {
          const area = document.createElement("textarea");
          area.value = value;
          area.setAttribute("readonly", "readonly");
          area.style.position = "absolute";
          area.style.left = "-9999px";
          document.body.appendChild(area);
          area.select();
          document.execCommand("copy");
          area.remove();
        }
        setStatus(successMessage || text("copiedDiagnostics"));
      } catch (error) {
        setStatus(error?.message || text("requestFailed"), "err");
      }
    }

    function downloadDiagnosticsText(filename, content) {
      const blob = new Blob([String(content || "")], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus(text("exportedFile", { filename }));
    }

    function bindDiagnosticsActions(root, diagnostics) {
      root.querySelectorAll("[data-diag-action]").forEach(button => {
        button.addEventListener("click", async () => {
          const action = button.getAttribute("data-diag-action");
          if (action === "copy-summary") return copyDiagnosticsText(buildSummaryText(diagnostics), text("copiedDiagnosticsSummary"));
          if (action === "copy-full") return copyDiagnosticsText(JSON.stringify(diagnostics, null, 2), text("copiedFullDiagnostics"));
          if (action === "copy-redacted") return copyDiagnosticsText(JSON.stringify(redactDiagnosticsForExport(diagnostics), null, 2), text("copiedRedactedDiagnostics"));
          if (action === "copy-prompt") {
            const promptBlock = diagnostics?.prompt_construction?.assembled_prompt_preview || JSON.stringify(diagnostics?.prompt_construction?.final_messages || [], null, 2);
            return copyDiagnosticsText(promptBlock, text("copiedPromptPreview"));
          }
          if (action === "copy-rag") return copyDiagnosticsText(JSON.stringify(diagnostics?.rag || {}, null, 2), text("copiedRagTrace"));
          if (action === "export-full") return downloadDiagnosticsText(`ai-diagnostics-${diagnostics?.request_id || "request"}.json`, JSON.stringify(diagnostics, null, 2));
          if (action === "export-redacted") return downloadDiagnosticsText(`ai-diagnostics-${diagnostics?.request_id || "request"}-redacted.json`, JSON.stringify(redactDiagnosticsForExport(diagnostics), null, 2));
        });
      });
    }
    function renderDiagnostics() {
      if (!isAdmin() || !state.lastDiagnostics) {
        ui.diagnosticsDock.classList.add("hidden");
        ui.diagnostics.classList.add("hidden");
        ui.diagnostics.innerHTML = "";
        ui.diagnosticsMeta.textContent = text("noDiagnosticsLoaded");
        return;
      }

      const d = state.lastDiagnostics;
      const general = d.general || {};
      const timing = d.timing || {};
      const tokenContext = d.token_context || {};
      const generationSettings = d.generation_settings || {};
      const runtime = d.runtime || {};
      const promptConstruction = d.prompt_construction || {};
      const ragOverview = d.rag?.overview || {};
      const ragChunks = d.rag?.chunks || {};
      const ragRerank = d.rag?.rerank || {};
      const errors = d.errors_warnings || {};

    function closePopover(returnFocus = false) {
      if (!activePopover) return;
      const { panel, trigger } = activePopover;
      if (trigger instanceof HTMLElement) {
        trigger.setAttribute("aria-expanded", "false");
        trigger.removeAttribute("aria-controls");
        if (returnFocus) trigger.focus();
      }
      panel?.remove();
      activePopover = null;
    }

    function positionPopover() {
      if (!activePopover?.panel || !activePopover?.trigger) return;
      const { panel, trigger } = activePopover;
      const rect = trigger.getBoundingClientRect();
      const margin = 12;
      const width = panel.offsetWidth || 280;
      const height = panel.offsetHeight || 220;
      const left = Math.max(margin, Math.min(rect.right - width, window.innerWidth - width - margin));
      const openAbove = rect.bottom + 8 + height > window.innerHeight - margin && rect.top - 8 - height > margin;
      const top = openAbove ? Math.max(margin, rect.top - height - 8) : Math.min(window.innerHeight - height - margin, rect.bottom + 8);
      panel.style.left = `${Math.round(left)}px`;
      panel.style.top = `${Math.round(top)}px`;
    }

    function openPopover(trigger, role = "dialog") {
      if (!(trigger instanceof HTMLElement)) return null;
      if (activePopover?.trigger === trigger) {
        closePopover();
        return null;
      }
      closePopover();
      const panel = document.createElement("div");
      panel.className = "popover";
      panel.id = `popover-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
      panel.setAttribute("role", role);
      panel.tabIndex = -1;
      document.body.appendChild(panel);
      activePopover = { panel, trigger };
      trigger.setAttribute("aria-haspopup", role === "menu" ? "menu" : "dialog");
      trigger.setAttribute("aria-expanded", "true");
      trigger.setAttribute("aria-controls", panel.id);
      positionPopover();
      return panel;
    }

    function buildPopoverHeader(title, copy = "") {
      return `
        <div>
          <h3 class="popover-title">${escapeHtml(title)}</h3>
          ${copy ? `<p class="popover-copy">${escapeHtml(copy)}</p>` : ""}
        </div>
      `;
    }
    async function api(path, method = "GET", body) {
      const config = {
        method,
        credentials: "same-origin",
        headers: {}
      };

      if (body !== undefined) {
        config.headers["Content-Type"] = "application/json";
        config.body = JSON.stringify(body);
      }

      const response = await fetch(APP_API + path, config);
      const text = await response.text();

      let json = {};
      try {
        json = text ? JSON.parse(text) : {};
      } catch {}

      if (!response.ok) {
        const error = new Error(json.detail || json.message || text || `Request failed (${response.status})`);
        error.status = response.status;
        error.payload = json;
        throw error;
      }

      return json;
    }

    function postAnalyticsEvent(eventName, surface, metadata = {}) {
      const payload = JSON.stringify({ event_name: eventName, surface, metadata });
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([payload], { type: "application/json" });
          if (navigator.sendBeacon(`${APP_API}/analytics/events`, blob)) {
            return;
          }
        }
      } catch {}
      fetch(`${APP_API}/analytics/events`, {
        method: "POST",
        credentials: "same-origin",
        keepalive: true,
        headers: { "Content-Type": "application/json" },
        body: payload
      }).catch(() => {});
    }

    function normalizeWarnings(list) {
      return Array.isArray(list) ? list.filter(Boolean) : [];
    }

    function warningLabel(warning) {
      return warning?.metric || warning?.level || warning?.warning || warning?.message || "limit";
    }

    function appendStatusWarnings(warnings) {
      const list = normalizeWarnings(warnings);
      if (!list.length) return;
      setStatus(text("warningPrefix", { value: list.map(warningLabel).join(", ") }), "warn");
    }

    function buildDiagnosticsFromFlat(flat) {
      const warnings = Array.isArray(flat.warnings) ? flat.warnings : [];
      const statusLevel = flat.status_level || (flat.request_error ? "error" : ((warnings.length || flat.retrieval_error || flat.rerank_error) ? "warn" : "ok"));
      return {
        request_id: flat.request_id || null,

        request_finished_at: flat.request_finished_at || null,
        chat_id: flat.chat_id || null,

    function normalizeDiagnostics(payload) {
      if (!payload || typeof payload !== "object") return null;

      const flat = {};
      for (const source of [payload.metrics, payload.admin_metrics, payload]) {
        if (source && typeof source === "object") Object.assign(flat, source);
      }

      const groupedSource = [payload.diagnostics, payload.admin_diagnostics].find(source => source && typeof source === "object");
      const grouped = groupedSource ? cloneData(groupedSource) : buildDiagnosticsFromFlat(flat);
      if (!grouped || typeof grouped !== "object") return null;

      const normalized = {
        ...flat,
        ...grouped,
        request_id: grouped.request_id ?? flat.request_id ?? null,
        request_started_at: grouped.request_started_at ?? flat.request_started_at ?? null,
        request_finished_at: grouped.request_finished_at ?? flat.request_finished_at ?? null,
        chat_id: grouped.chat_id ?? flat.chat_id ?? payload.chat_id ?? null,
        user_id: grouped.user_id ?? flat.user_id ?? null,
        user_role: grouped.user_role ?? flat.user_role ?? null,
        status_level: grouped.status_level ?? flat.status_level ?? null,
        general: grouped.general || {},
        timing: grouped.timing || {},
        token_context: grouped.token_context || {},
        generation_settings: grouped.generation_settings || {},
        runtime: grouped.runtime || {},
        prompt_construction: grouped.prompt_construction || {},
        rag: grouped.rag || { overview: {}, chunks: {}, rerank: {} },
        errors_warnings: grouped.errors_warnings || {},
        resources: grouped.resources || {},
        warnings: Array.isArray(grouped.warnings) ? grouped.warnings : warnings
      };

      normalized.retrieved_chunks = Array.isArray(normalized.rag?.chunks?.final_injected_chunks) ? normalized.rag.chunks.final_injected_chunks : (Array.isArray(flat.retrieved_chunks) ? flat.retrieved_chunks : []);
      normalized.retrieval_candidates = Array.isArray(normalized.rag?.chunks?.all_retrieved_chunks) ? normalized.rag.chunks.all_retrieved_chunks : (Array.isArray(flat.retrieval_candidates) ? flat.retrieval_candidates : []);
      normalized.retrieval_query = normalized.rag?.chunks?.retrieval_query ?? flat.retrieval_query ?? null;
      normalized.retrieval_count = flat.retrieval_count ?? normalized.retrieved_chunks.length;
      normalized.retrieval_candidate_count = flat.retrieval_candidate_count ?? normalized.retrieval_candidates.length;
      return normalized;
    }

    function mergeChatSummary(chatId, updates) {
      const id = String(chatId || "").trim();
      if (!id) return;
      state.chats = state.chats.map(chat => (
        String(chat.id) === id ? { ...chat, ...updates } : chat
      ));
      if (String(state.activeChatId) === id) {
        if (updates.title !== undefined) state.activeChatTitle = updates.title || state.activeChatTitle;
        if (updates.is_deleted !== undefined) state.activeChatDeleted = !!updates.is_deleted;
      }
      renderActiveChatTitle();
      renderChatList();
    }

    function syncActiveChatTitle(chatId, title) {
      const nextTitle = String(title || "").trim();
      if (!nextTitle) return;
      mergeChatSummary(chatId, { title: nextTitle });
    }

    function clearActiveChat() {
      state.activeChatId = null;
      state.activeChatTitle = "";
      state.activeChatMessages = [];
      state.activeChatDeleted = false;
      renderActiveChatTitle();
      renderMessages();
      showDiagnosticsForChat(null);
    }

    function syncSelectionToVisibleChats() {
      const visible = getVisibleChats();
      if (visible.some(chat => chat.id === state.activeChatId)) {
        return state.activeChatId;
      }
      if (visible.length) {
        state.activeChatId = visible[0].id;
        state.activeChatTitle = visible[0].title || text("newChat");
        state.activeChatDeleted = !!visible[0].is_deleted;
        return state.activeChatId;
      }
      clearActiveChat();
      return null;
    }

    function extractTextFromPayload(payload) {
      if (!payload || typeof payload !== "object") return "";
      if (typeof payload.delta === "string") return payload.delta;
      if (typeof payload.message?.content === "string") return payload.message.content;
      if (typeof payload.content === "string") return payload.content;

      const choice = Array.isArray(payload.choices) ? payload.choices[0] : null;
      if (choice) {
        if (typeof choice.delta?.content === "string") return choice.delta.content;
        if (typeof choice.message?.content === "string") return choice.message.content;
        if (typeof choice.text === "string") return choice.text;
      }

      return "";
    }

    function extractFinishReason(payload) {
      if (!payload || typeof payload !== "object") return null;
      if (payload.finish_reason) return payload.finish_reason;
      const choice = Array.isArray(payload.choices) ? payload.choices[0] : null;
      return choice?.finish_reason || null;
    }

    function extractCitationsFromPayload(payload) {
      if (!payload || typeof payload !== "object") return [];
      if (Array.isArray(payload.citations)) return normalizeCitations(payload.citations);
      if (Array.isArray(payload.message?.citations)) return normalizeCitations(payload.message.citations);
      const choice = Array.isArray(payload.choices) ? payload.choices[0] : null;
      if (Array.isArray(choice?.message?.citations)) return normalizeCitations(choice.message.citations);
      return [];
    }

    async function readStreamResponse(response, handlers = {}) {
      if (!response.body) return;

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let eventName = "message";

      const dispatchBlock = block => {
        if (!block.trim()) return;

        const lines = block.split(/\r?\n/);
        const dataParts = [];
        eventName = "message";

        for (const line of lines) {
          if (line.startsWith("event:")) {
            eventName = line.slice(6).trim() || "message";
            continue;
          }
          if (line.startsWith("data:")) {
            dataParts.push(line.slice(5).trim());
          }
        }

        if (!dataParts.length) return;
        const dataText = dataParts.join("\n");
        if (dataText === "[DONE]") {
          if (typeof handlers.onEvent === "function") {
            handlers.onEvent({ done: true }, { event: eventName, raw: block });
          }
          return;
        }

        let payload = {};
        try {
          payload = JSON.parse(dataText);
        } catch {
          payload = { delta: dataText };
        }

        if (typeof handlers.onEvent === "function") {
          handlers.onEvent(payload, { event: eventName, raw: block });
        }
      };

      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

        let markerIndex = buffer.search(/\r?\n\r?\n/);
        while (markerIndex >= 0) {
          const block = buffer.slice(0, markerIndex);
          const separatorLength = buffer.slice(markerIndex).startsWith("\r\n\r\n") ? 4 : 2;
          buffer = buffer.slice(markerIndex + separatorLength);
          dispatchBlock(block);
          markerIndex = buffer.search(/\r?\n\r?\n/);
        }

        if (done) {
          const tail = buffer.trim();
          if (tail) dispatchBlock(tail);
          break;
        }
      }
    }
    async function loadSession() {
      const data = await api("/auth/me");
      state.user = data.user || null;
      syncPreferencesFromUser(state.user);
      if (!isAdmin()) {
        state.diagnosticsExpanded = false;
        setDiagnostics(null);
      }
    }

    async function loadFolders() {
      const data = await api("/chat-folders");
      state.folders = Array.isArray(data.folders) ? data.folders : [];
      if (state.activeScope === "folder" && !state.folders.some(folder => folder.id === state.activeFolderId)) {
        state.activeScope = "all";
        state.activeFolderId = null;
      }
      renderScopeTabs();
      renderFolderList();
    }

    async function loadChats() {
      const data = await api("/chats?include_deleted=true");
      state.chats = Array.isArray(data.chats) ? data.chats : [];
      const selectedId = syncSelectionToVisibleChats();
      renderScopeTabs();
      renderFolderList();
      renderChatList();
      renderActiveChatTitle();
      return selectedId;
    }

    async function loadChat(chatId) {
      const chatRef = state.chats.find(chat => String(chat.id) === String(chatId)) || null;
      const query = chatRef?.is_deleted ? "?include_deleted=true" : "";
      const data = await api(`/chats/${encodeURIComponent(chatId)}${query}`);
      const chat = data.chat || {};
      state.activeChatId = chat.id || chatId;
      state.activeChatTitle = chat.title || text("newChat");
      state.activeChatDeleted = !!chat.is_deleted;
      state.activeChatMessages = Array.isArray(chat.messages)
        ? chat.messages.map(message => ({
            role: String(message.role || "assistant").toLowerCase() === "assistant" ? "ai" : "user",
            content: String(message.content || ""),
            citations: normalizeCitations(message.citations),
            renderedHtmlCache: null
          }))
        : [];
      mergeChatSummary(state.activeChatId, {
        title: state.activeChatTitle,
        is_deleted: !!chat.is_deleted,
        is_saved: !!chat.is_saved,
        folder_id: chat.folder_id ?? null,
        updated_at: chat.updated_at || chatRef?.updated_at || null
      });
      renderChatList();
      renderActiveChatTitle();
      renderMessages();
      showDiagnosticsForChat(state.activeChatId);
      setStatus(state.activeChatDeleted ? text("loadedChatFromTrash", { title: state.activeChatTitle }) : text("loadedChat", { title: state.activeChatTitle }));
    }

    async function createNewChat() {
      if (state.sending) return;
      state.activeScope = "all";
      state.activeFolderId = null;
      const data = await api("/chats", "POST", { title: text("newChat") });
      const chat = data.chat || {};
      state.activeChatId = chat.id || null;
      state.activeChatTitle = chat.title || text("newChat");
      state.activeChatMessages = [];
      state.activeChatDeleted = false;
      setDiagnostics(null);
      await loadChats();
      if (chat.id) {
        await loadChat(chat.id);
      } else {
        renderActiveChatTitle();
        renderMessages();
      }
      ui.prompt.focus();
      setStatus(text("ready"));
    }

    function openTextEditorPopover(trigger, title, copy, initialValue, confirmLabel, maxLength, onSave) {
      const panel = openPopover(trigger, "dialog");
      if (!panel) return;
      panel.innerHTML = `
        <div class="popover-stack">
          ${buildPopoverHeader(title, copy)}
          <div class="popover-form">
            <input class="popover-field" type="text" maxlength="${maxLength}" value="${escapeHtml(initialValue || "")}" />
            <div class="popover-actions">
              <button type="button" class="btn" data-action="cancel">${escapeHtml(text("cancel"))}</button>
              <button type="button" class="btn primary" data-action="save">${escapeHtml(confirmLabel)}</button>
            </div>
          </div>
        </div>
      `;
      const input = panel.querySelector(".popover-field");
      const saveBtn = panel.querySelector('[data-action="save"]');
      const cancelBtn = panel.querySelector('[data-action="cancel"]');
      saveBtn?.addEventListener("click", async () => {
        try {
          await onSave(String(input?.value || "").trim());
          closePopover();
        } catch (error) {
          setStatus(error?.message || text("saveFailed"), "err");
        }
      });
      cancelBtn?.addEventListener("click", () => closePopover(true));
      input?.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          saveBtn?.click();
        }
      });
      input?.focus();
      input?.select();
      positionPopover();
    }

    async function reloadSidebarAndActiveChat(preferredChatId = state.activeChatId, preferredScope = state.activeScope, preferredFolderId = state.activeFolderId) {
      state.activeScope = preferredScope;
      state.activeFolderId = preferredScope === "folder" ? preferredFolderId : null;
      await loadFolders();
      const nextChatId = await loadChats();
      const targetChatId = preferredChatId && state.chats.some(chat => String(chat.id) === String(preferredChatId)) ? preferredChatId : nextChatId;
      if (targetChatId) {
        await loadChat(targetChatId);
      }
    }

    function openMoveChatPopover(trigger, chatId) {
      const panel = openPopover(trigger, "dialog");
      if (!panel) return;
      panel.innerHTML = `
        <div class="popover-stack">
          ${buildPopoverHeader(text("addToFolderTitle"), text("addToFolderCopy"))}
          <div class="popover-choice-list"></div>
        </div>
      `;
      const list = panel.querySelector(".popover-choice-list");
      const addChoice = (label, folderId = null) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "btn popover-choice";
        button.textContent = label;
        button.addEventListener("click", async () => {
          try {
            await api(`/chats/${encodeURIComponent(chatId)}`, "PATCH", { folder_id: folderId });
            if (state.activeScope === "folder" && folderId !== state.activeFolderId) {
              state.activeScope = folderId ? "folder" : "all";
              state.activeFolderId = folderId;
            }
            await reloadSidebarAndActiveChat(chatId, state.activeScope, state.activeFolderId);
            setStatus(folderId ? text("chatMovedTo", { label }) : text("chatMovedOutOfFolders"));
            closePopover();
          } catch (error) {
            setStatus(error.message || text("failedToMoveChat"), "err");
          }
        });
        list?.appendChild(button);
      };
      addChoice(text("uncategorized"), null);
      if (state.folders.length) {
        state.folders.forEach(folder => addChoice(folder.name, folder.id));
      }
      positionPopover();
    }

      `;
      panel.querySelector('[data-action="cancel"]')?.addEventListener("click", () => closePopover(true));
      panel.querySelector('[data-action="confirm"]')?.addEventListener("click", async () => {
        try {
          const savedChatId = state.activeChatId;
          if (state.activeScope === "folder" && String(state.activeFolderId) === String(folder.id)) {
            state.activeScope = "all";
            state.activeFolderId = null;
          }
          await api(`/chat-folders/${encodeURIComponent(folder.id)}`, "DELETE");
          await loadFolders();
          const nextChatId = await loadChats();
          const targetChatId = savedChatId && state.chats.some(c => String(c.id) === String(savedChatId) && !c.is_deleted)
            ? savedChatId : nextChatId;
          if (targetChatId) await loadChat(targetChatId);
          setStatus(text("folderDeletedMoved"));
          closePopover();
        } catch (error) {
          setStatus(error.message || text("failedToDeleteFolder"), "err");
        }
      });
      positionPopover();
    }

    async function toggleSavedChat(chatId, nextSaved) {
      try {
        if (state.activeScope === "saved" && !nextSaved) {
          state.activeScope = "all";
          state.activeFolderId = null;
        }
        await api(`/chats/${encodeURIComponent(chatId)}`, "PATCH", { is_saved: nextSaved });
        await reloadSidebarAndActiveChat(chatId, state.activeScope, state.activeFolderId);
        setStatus(nextSaved ? text("chatSaved") : text("chatRemovedFromSaved"));
      } catch (error) {
        setStatus(error.message || text("failedToUpdateSavedChat"), "err");
      }
    }

    async function deleteChat(chatId) {
      try {
        state.activeScope = "trash";
        state.activeFolderId = null;
        await api(`/chats/${encodeURIComponent(chatId)}`, "DELETE");
        await reloadSidebarAndActiveChat(chatId, "trash", null);
        setStatus(text("chatMovedToTrash"));
      } catch (error) {
        setStatus(error.message || text("failedToDeleteChat"), "err");
        throw error;
      }
    }

    async function restoreChat(chatId) {
      try {
        state.activeScope = "all";
        state.activeFolderId = null;
        await api(`/chats/${encodeURIComponent(chatId)}/restore`, "POST");
        await reloadSidebarAndActiveChat(chatId, "all", null);
        setStatus(text("chatRestored"));
      } catch (error) {
        setStatus(error.message || text("failedToRestoreChat"), "err");
      }
    }

    async function clearChatTrash() {
      if (!window.confirm(text("clearChatTrashConfirm"))) return;
      try {
        if (ui.clearChatTrashBtn) ui.clearChatTrashBtn.disabled = true;
        await api("/chats/trash/clear", "POST");
        await reloadSidebarAndActiveChat(null, "trash", null);
        setStatus(text("chatTrashCleared"));
      } catch (error) {
        setStatus(error.message || text("failedToClearChatTrash"), "err");
      } finally {
        if (ui.clearChatTrashBtn) ui.clearChatTrashBtn.disabled = false;
      }
    }

    function openFolderMenu(trigger, folderId) {
      const folder = state.folders.find(item => String(item.id) === String(folderId));
      if (!folder) return;
      const panel = openPopover(trigger, "menu");
      if (!panel) return;
      panel.innerHTML = `<div class="menu-list"></div>`;
      const list = panel.querySelector('.menu-list');
      const items = [
        { label: text("rename"), onClick: () => { closePopover(); openFolderEditorPopover(trigger, folder.id); } },
        { label: text("delete"), className: 'danger', onClick: () => { closePopover(); openDeleteFolderPopover(trigger, folder.id); } }
      ];
      items.forEach(item => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `menu-item ${item.className || ''}`.trim();
        button.textContent = item.label;
        button.addEventListener('click', (event) => { event.stopPropagation(); item.onClick(); });
        list?.appendChild(button);
      });
      positionPopover();
    }

    function openChatMenu(trigger, chatId) {
      const chat = state.chats.find(item => String(item.id) === String(chatId));
      if (!chat) {
        setStatus(text("createOrOpenChatFirst"), 'warn');
        return;
      }
      const panel = openPopover(trigger, 'menu');
      if (!panel) return;
      panel.innerHTML = `<div class="menu-list"></div>`;
      const list = panel.querySelector('.menu-list');
      const items = chat.is_deleted
        ? [
            { label: text("restore"), onClick: () => { closePopover(); restoreChat(chat.id); } }
          ]
        : [
            { label: text("rename"), onClick: () => { closePopover(); openRenameChatPopover(trigger, chat.id); } },
            { label: chat.is_saved ? text("unsave") : text("saveChat"), onClick: () => { closePopover(); toggleSavedChat(chat.id, !chat.is_saved); } },
            { label: text("addToFolder"), onClick: () => { closePopover(); openMoveChatPopover(trigger, chat.id); } },
            { label: text("moveToTrash"), className: 'danger', onClick: () => { closePopover(); openDeleteChatPopover(trigger, chat.id); } }
          ];
      items.forEach(item => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `menu-item ${item.className || ''}`.trim();
        button.textContent = item.label;
        button.addEventListener('click', (event) => { event.stopPropagation(); item.onClick(); });
        list?.appendChild(button);
      });
      positionPopover();
    }
    async function sendPrompt(promptValue) {
      const promptText = String(promptValue || "").trim();
      if (!promptText || state.sending || state.activeChatDeleted || state.activeScope === "trash" || state.promptOverLimit) return;

      closePopover();
      const previousChatId = state.activeChatId;
      const previousTitle = state.activeChatTitle;
      const previousMessages = Array.isArray(state.activeChatMessages)
        ? state.activeChatMessages.map(message => ({ ...message }))
        : [];
      const generatedTitle = deriveChatTitle(promptText);
      const requestMessages = [
        ...previousMessages,
        { role: "user", content: promptText }
      ];
      const controller = new AbortController();

      state.sending = true;
      state.stopRequested = false;
      activeGenerationController = controller;
      renderComposerState();

      if (!state.activeChatId) {
        if (state.activeScope !== "all") {
          state.activeScope = "all";
          state.activeFolderId = null;
          renderScopeTabs();
          renderFolderList();
        }
        state.activeChatTitle = generatedTitle || text("newChat");
        renderActiveChatTitle();
      }
      state.activeChatMessages = [
        ...requestMessages,
        { role: "ai", content: "", citations: [], streaming: true, renderedHtmlCache: null, thinkingMode: !!state.ragEnabled }
      ];

      const assistantIndex = state.activeChatMessages.length - 1;

      renderMessages();
      setStatus(text("waitingForModel"));
      setDiagnostics(null);

      let assistantText = "";
      let responseCitations = [];
      let finalChatId = state.activeChatId;
      let responseWarnings = [];
      let responseMetrics = null;
      let sawChunk = false;
      let sawTerminal = false;
      let wasStopped = false;

      try {
        const response = await fetch(APP_API + "/chat/completions", {
          method: "POST",
          credentials: "same-origin",
          signal: controller.signal,
          headers: {
            "Content-Type": "application/json",
            "Accept": "text/event-stream, application/json"
          },
          body: JSON.stringify({
            model: MODEL_NAME,
            chat_id: state.activeChatId,
            title: state.activeChatId ? undefined : generatedTitle,
            messages: requestMessages.map(message => ({
              role: message.role === "ai" ? "assistant" : message.role,
              content: String(message.content || "")
            })),
            stream: true,
            retrieval_enabled: state.ragEnabled
          })
        });

        const contentType = response.headers.get("content-type") || "";

        if (!response.ok) {
          const bodyText = await response.text();
          let parsed = {};
          try {
            parsed = bodyText ? JSON.parse(bodyText) : {};
          } catch {}
          const error = new Error(parsed.detail || parsed.message || bodyText || `${text("requestFailed")} (${response.status})`);
          error.status = response.status;
          error.payload = parsed;
          throw error;
        }

        if (contentType.includes("text/event-stream") && response.body) {
          await readStreamResponse(response, {
            onEvent(payload, event) {
              if (payload.done || event.event === "done") {
                sawTerminal = true;
              }
              if (Array.isArray(payload.warnings)) {
                responseWarnings = payload.warnings;
              }
              if (payload.chat_id) {
                finalChatId = payload.chat_id;
              }
              if (payload.title) {
                syncActiveChatTitle(payload.chat_id || finalChatId, payload.title);
              }
              const diagnostics = normalizeDiagnostics(payload);
              if (diagnostics) {
                responseMetrics = { ...(responseMetrics || {}), ...diagnostics };
              }
              const citations = extractCitationsFromPayload(payload);
              if (citations.length) {
                responseCitations = citations;
                if (state.activeChatMessages[assistantIndex]) {
                  state.activeChatMessages[assistantIndex].citations = citations;
                }
              }
              const delta = extractTextFromPayload(payload);
              if (delta) {
                assistantText += delta;
                sawChunk = true;
                if (state.activeChatMessages[assistantIndex]) {
                  state.activeChatMessages[assistantIndex].content = assistantText;
                  state.activeChatMessages[assistantIndex].citations = responseCitations;
                  state.activeChatMessages[assistantIndex].renderedHtmlCache = null;
                }
                updateStreamingMessage(assistantIndex, isNearMessagesBottom(), false);
              }
              const finishReason = extractFinishReason(payload);
              if (finishReason) {
                responseMetrics = { ...(responseMetrics || {}), finish_reason: finishReason };
              }
              if (payload.needs_continuation || payload.continuation || payload.type === "continuation") {
                responseMetrics = {
                  ...(responseMetrics || {}),
                  continuation_count: Number(responseMetrics?.continuation_count || payload.continuation_count || 0) + 1
                };
                setStatus(text("modelContinuing"), "warn");
              }
              if (payload.continuation_limit_hit !== undefined) {
                responseMetrics = {
                  ...(responseMetrics || {}),
                  continuation_limit_hit: !!payload.continuation_limit_hit
                };
              }
            }
          });
        } else {
          const output = await response.json();
          finalChatId = output.chat_id || finalChatId;
          assistantText = extractTextFromPayload(output);
          responseCitations = extractCitationsFromPayload(output);
          sawChunk = Boolean(assistantText);
          responseWarnings = Array.isArray(output.warnings) ? output.warnings : [];
          responseMetrics = normalizeDiagnostics(output);
          if (output.title) {
            syncActiveChatTitle(output.chat_id || finalChatId, output.title);
          }
        }

        if (state.activeChatMessages[assistantIndex]) {
          state.activeChatMessages[assistantIndex].content = assistantText;
          state.activeChatMessages[assistantIndex].citations = responseCitations;
          state.activeChatMessages[assistantIndex].streaming = false;
          state.activeChatMessages[assistantIndex].renderedHtmlCache = null;
        }
        updateStreamingMessage(assistantIndex, true, true);

        if (finalChatId) {
          state.activeChatId = finalChatId;
        }

        if (responseWarnings.length) {
          appendStatusWarnings(responseWarnings);
        } else {
          setStatus(sawTerminal || sawChunk ? text("complete") : text("responseReceived"));
        }

        if (responseMetrics) {
          setDiagnostics(responseMetrics, finalChatId || state.activeChatId || previousChatId);
        }

        const targetChatId = finalChatId || state.activeChatId;
        if (targetChatId && looksDefaultTitle(previousTitle) && generatedTitle && generatedTitle !== text("newChat")) {
          try {
            await api(`/chats/${encodeURIComponent(targetChatId)}`, "PATCH", { title: generatedTitle });
            syncActiveChatTitle(targetChatId, generatedTitle);
          } catch {}
        }

        await loadChats();
        if (targetChatId) {
          await loadChat(targetChatId);
        }
      } catch (error) {
        wasStopped = state.stopRequested || error?.name === "AbortError";
        const statusCode = Number(error?.status || 0);
        if (!responseMetrics && error?.payload) {
          responseMetrics = normalizeDiagnostics(error.payload);
        }

        if (wasStopped) {
          if (!sawChunk) {
            state.activeChatMessages = requestMessages;
            renderMessages();
          } else if (state.activeChatMessages[assistantIndex]) {
            state.activeChatMessages[assistantIndex].streaming = false;
            updateStreamingMessage(assistantIndex, true, true);
          }
          setStatus(text("stopped"));
        } else {
          if (!sawChunk) {
            state.activeChatId = previousChatId;
            state.activeChatTitle = previousTitle;
            state.activeChatMessages = previousMessages;
            renderActiveChatTitle();
            renderMessages();
          } else if (state.activeChatMessages[assistantIndex]) {
            state.activeChatMessages[assistantIndex].streaming = false;
            updateStreamingMessage(assistantIndex, true, true);
          }

          if (statusCode === 423) {
            setStatus(error instanceof Error ? error.message : text("accountLocked"), "err");
          } else if (statusCode === 429) {
            setStatus(error instanceof Error ? error.message : text("rateLimitReached"), "err");
          } else {
            setStatus(error instanceof Error ? error.message : text("requestFailed"), "err");
          }
        }

        if (responseMetrics) {
          setDiagnostics(responseMetrics, finalChatId || state.activeChatId || previousChatId);
        }
      } finally {
        activeGenerationController = null;
        state.sending = false;
        state.stopRequested = false;
        renderComposerState();
        ui.prompt.focus();
        renderDiagnostics();
      }
    }
    function autoResizeTextarea() {
      ui.prompt.style.height = "auto";
      ui.prompt.style.height = Math.min(ui.prompt.scrollHeight, 200) + "px";
    }

    function toggleSidebar(forceState) {
      const collapsed = forceState !== undefined ? !forceState : !ui.sidebar.classList.contains("collapsed");
      ui.sidebar.classList.toggle("collapsed", collapsed);
      ui.sidebarOverlay.classList.toggle("visible", !collapsed && window.innerWidth <= 768);
    }

    function applyTheme(dark) {
      document.documentElement.classList.toggle("dark", dark);
      ui.themeIcon.innerHTML = dark ? "&#9790;" : "&#9788;";
      ui.themeToggle.setAttribute("title", dark ? text("darkTheme") : text("lightTheme"));
      ui.themeToggle.setAttribute("aria-label", dark ? text("darkTheme") : text("lightTheme"));
      try { localStorage.setItem(STORAGE_KEYS.theme, dark ? "dark" : "light"); } catch {}
    }

    function loadThemePreference() {
      try {
        const saved = localStorage.getItem(STORAGE_KEYS.theme);
        if (saved === "dark") { applyTheme(true); return; }
        if (saved === "light") { applyTheme(false); return; }
      } catch {}
      applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
    }

    function bindEvents() {
      if (ui.clearChatTrashBtn) {
        ui.clearChatTrashBtn.addEventListener("click", () => {
          clearChatTrash().catch(() => {});
        });
      }

      ui.ragToggleBtn.addEventListener("click", () => {
        setRagEnabled(!state.ragEnabled);
      });

      ui.diagnosticsToggleBtn.addEventListener("click", () => {
        state.diagnosticsExpanded = !state.diagnosticsExpanded;
        renderDiagnostics();
      });

      ui.scopeTabs.addEventListener("click", event => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const button = target.closest("[data-scope]");
        if (!button) return;
        const scope = button.getAttribute("data-scope");
        if (!scope) return;
        closePopover();
        selectScope(scope).catch(error => {
          setStatus(error.message || text("failedToSwitchChatScope"), "err");
        });
      });

            ui.folderList.addEventListener("click", event => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const createButton = target.closest("[data-create-folder]");
        if (createButton) {
          event.preventDefault();
          closePopover();
          openFolderEditorPopover(createButton);
          return;
        }
        const menuButton = target.closest("[data-folder-menu-id]");
        if (menuButton) {
          event.preventDefault();
          const folderId = menuButton.getAttribute("data-folder-menu-id");
          if (folderId) openFolderMenu(menuButton, folderId);
          return;
        }
        const folderButton = target.closest("[data-folder-id]");
        if (!folderButton) return;
        const folderId = folderButton.getAttribute("data-folder-id");
        if (!folderId) return;
        closePopover();
        selectScope("folder", folderId).catch(error => {
          setStatus(error.message || text("failedToOpenFolder"), "err");
        });
      });

      ui.chatList.addEventListener("click", event => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        const createButton = target.closest("[data-create-chat]");
        if (createButton) {
          event.preventDefault();
          closePopover();
          createNewChat().catch(error => {
            setStatus(error.message || text("failedToCreateChat"), "err");
          });
          return;
        }

        const menuButton = target.closest("[data-chat-menu-id]");
        if (menuButton) {
          event.preventDefault();
          const chatId = menuButton.getAttribute("data-chat-menu-id");
          if (chatId) openChatMenu(menuButton, chatId);
          return;
        }

        const button = target.closest("[data-chat-id]");
        if (!button) return;
        const id = button.getAttribute("data-chat-id");
        if (!id) return;
        closePopover();
        loadChat(id).catch(error => {
          setStatus(error.message || text("failedToLoadChat"), "err");
        });
      });

      if (ui.createFolderBtn) {
        ui.createFolderBtn.addEventListener("click", () => {
          closePopover();
          openFolderEditorPopover(ui.createFolderBtn);
        });
      }

      if (ui.createChatBtn) {
        ui.createChatBtn.addEventListener("click", () => {
          closePopover();
          createNewChat().catch(error => {
            setStatus(error.message || text("failedToCreateChat"), "err");
          });
        });
      }

      ui.composer.addEventListener("submit", event => {
        event.preventDefault();
        if (state.sending) {
          stopActiveGeneration();
          return;
        }
        const text = ui.prompt.value.trim();
        if (!text) return;
        ui.prompt.value = "";
        autoResizeTextarea();
        sendPrompt(text);
      });

      ui.sendBtn.addEventListener("click", event => {
        if (!state.sending) return;
        event.preventDefault();
        stopActiveGeneration();
      });

      ui.prompt.addEventListener("input", () => { autoResizeTextarea(); renderComposerState(); });
      ui.prompt.addEventListener("keydown", event => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          if (state.sending) return;
          ui.composer.dispatchEvent(new Event("submit", { cancelable: true }));
        }
      });

      ui.sidebarToggleBtn.addEventListener("click", () => toggleSidebar());
      ui.sidebarOverlay.addEventListener("click", () => toggleSidebar(false));
      ui.themeToggle.addEventListener("click", () => {
        applyTheme(!document.documentElement.classList.contains("dark"));
      });

      if (ui.langToggle) {
        ui.langToggle.addEventListener("click", () => {
          setSessionLanguage(state.language === "en" ? "es" : "en");
        });
      }

      ui.messages.addEventListener("click", event => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const suggestion = target.closest("[data-suggestion]");
        if (!suggestion) return;
        const text = suggestion.getAttribute("data-suggestion");
        if (!text) return;
        ui.prompt.value = "";
        autoResizeTextarea();
        sendPrompt(text);
      });

      document.addEventListener("click", event => {
        if (!activePopover) return;
        const target = event.target;
        if (!(target instanceof Node)) return;
        if (activePopover.panel.contains(target) || activePopover.trigger.contains(target)) return;
        closePopover();
      });

      document.addEventListener("keydown", event => {
        if (event.key !== "Escape" || !activePopover) return;
        event.preventDefault();
        closePopover(true);
      });

      window.addEventListener("resize", () => {
        if (activePopover) positionPopover();
      });

      document.addEventListener("scroll", () => {
        if (activePopover) positionPopover();
      }, true);
    }
    async function init() {
      loadLocalPreferences();
      loadThemePreference();
      renderStaticText();
      setStatus(text("loading"));
      await loadSession();
      await loadFolders();
      const nextChatId = await loadChats();

      if (nextChatId) {
        await loadChat(nextChatId);
      } else {
        renderMessages();
      }

      renderRagToggle();
      renderScopeTabs();
      renderFolderList();
      renderDiagnostics();
      renderComposerState();
      setStatus(text("ready"));
      ui.prompt.focus();
    }

    bindEvents();

    init().catch(error => {
      setStatus(error.message || text("initializationFailed"), "err");
    });
  </script>
</body>
</html>
