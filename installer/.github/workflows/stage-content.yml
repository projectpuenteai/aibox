# Manually-triggered workflow to push freshly built Chroma index shards
# into the Cloudflare R2 bucket. The shards are the one piece of content
# AIBox itself hosts — HF/Kiwix/Kolibri assets stream straight from their
# upstreams.
#
# Inputs:
#   shards_path: path under the repo to a directory of *.tar.zst shards.
#                Defaults to dist/stage/chroma. Local builds drop their
#                output here.
#   target_prefix: R2 path prefix, e.g. "aibox/chroma/v1". Files are
#                  uploaded at <prefix>/<filename>.
#
# This workflow does NOT cut a manifest — call release.yml separately
# after staging new shards.

name: Stage R2 content

on:
  workflow_dispatch:
    inputs:
      shards_path:
        description: 'Path under repo to *.tar.zst shards'
        type: string
        default: 'dist/stage/chroma'
        required: true
      target_prefix:
        description: 'R2 path prefix (e.g. aibox/chroma/v1)'
        type: string
        default: 'aibox/chroma/v1'
        required: true
      generate_sums_only:
        description: 'Only compute and print sha256s; skip upload'
        type: boolean
        default: false

permissions:
  contents: read

jobs:

  stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install boto3

      - name: Show plan
        run: |
          echo "Source: ${{ inputs.shards_path }}"
          echo "Target: r2://${{ vars.AIBOX_R2_BUCKET }}/${{ inputs.target_prefix }}/"
          ls -lh "${{ inputs.shards_path }}" || true

      - name: Compute SHA256 manifest
        run: |
          out="${{ inputs.shards_path }}/SHA256SUMS"
          : > "$out"
          for f in "${{ inputs.shards_path }}"/*.tar.zst; do
            [ -f "$f" ] || continue
            sha=$(sha256sum "$f" | awk '{print $1}')
            base=$(basename "$f")
            echo "$sha  $base" | tee -a "$out"
          done

      - name: Upload to R2
        if: ${{ !inputs.generate_sums_only }}
        env:
          AIBOX_R2_ACCOUNT_ID: ${{ secrets.AIBOX_R2_ACCOUNT_ID }}
          AIBOX_R2_ACCESS_KEY_ID: ${{ secrets.AIBOX_R2_ACCESS_KEY_ID }}
          AIBOX_R2_SECRET_ACCESS_KEY: ${{ secrets.AIBOX_R2_SECRET_ACCESS_KEY }}
          AIBOX_R2_BUCKET: ${{ vars.AIBOX_R2_BUCKET }}
        run: |
          python aibox/installer/build/stage_r2_content.py \
            --upload-shards "${{ inputs.shards_path }}" \
            --target-prefix "${{ inputs.target_prefix }}"

      - uses: actions/upload-artifact@v4
        with:
          name: shard-checksums
          path: ${{ inputs.shards_path }}/SHA256SUMS
