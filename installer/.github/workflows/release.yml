# Tag-triggered release pipeline for AIBox.
#
# Produces:
#   - ghcr.io/projectpuenteai/aibox-ai-control:<version> (with SHA pin)
#   - AIBox-Setup-<version>.exe (signed)
#   - AIBox First Run.exe and the rest of dist/stage/first-run/
#   - manifest-<version>.json (signed) and .sig
#   - AIBox-Setup-<version>.exe.sha256
#   - GitHub Release populated with everything above
#
# Notes:
#   - Code signing uses Azure Trusted Signing. The secrets must be set
#     in the repo for the sign step to run; without them, the workflow
#     produces unsigned artifacts and continues (useful for dry runs).
#   - The ed25519 release signing key lives in the AIBOX_MANIFEST_PRIVKEY
#     secret; the public counterpart is checked into the WPF resources at
#     installer/first-run/Resources/release-pubkey.ed25519.
#   - R2 chroma shards are NOT uploaded here — they're pushed by the
#     manual stage-content.yml workflow, and only their URLs+sha256 are
#     referenced by the manifest.

name: Release AIBox

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts but do not publish the GitHub release'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

# Serialize release runs so two tags pushed in rapid succession don't race
# on the same R2 keys / latest.json pointer / GHCR tags.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # 1. Build ai-control image and push to GHCR. We capture the digest so the
  #    manifest can pin it.
  # ---------------------------------------------------------------------------
  build-ai-control:
    name: Build ai-control image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.refs.outputs.image_ref }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: aibox/tools/ai-control
          file: aibox/tools/ai-control/Dockerfile
          push: true
          tags: |
            ghcr.io/projectpuenteai/aibox-ai-control:${{ steps.version.outputs.version }}
            ghcr.io/projectpuenteai/aibox-ai-control:latest

      - name: Emit image ref + digest
        id: refs
        run: |
          echo "image_ref=ghcr.io/projectpuenteai/aibox-ai-control:${{ steps.version.outputs.version }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Verify image ref is pullable
        run: docker pull ${{ steps.refs.outputs.image_ref }}

  # ---------------------------------------------------------------------------
  # 2. Build the WPF First Run app on Windows.
  # ---------------------------------------------------------------------------
  build-first-run:
    name: Build First Run app
    runs-on: windows-latest
    needs: [build-ai-control]
    outputs:
      version: ${{ steps.ver.outputs.version }}
    env:
      AZURE_SIGNING_TENANT: ${{ secrets.AZURE_SIGNING_TENANT }}
      AZURE_SIGNING_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
      AZURE_SIGNING_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
      AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
      AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
      AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF}" -like "refs/tags/v*") {
            $v = "${env:GITHUB_REF}".Substring(11)
          } else {
            $v = "0.0.0-dev.$(${env:GITHUB_SHA}.Substring(0, 7))"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Bake build constants
        shell: pwsh
        run: |
          $cs = "aibox/installer/first-run/Services/BuildConstants.cs"
          (Get-Content $cs) `
            -replace 'public const string ManifestVersion = ".*?";', "public const string ManifestVersion = `"${{ steps.ver.outputs.version }}`";" `
            -replace 'public const string ManifestBaseUrl = ".*?";', 'public const string ManifestBaseUrl = "https://cdn.projectpuenteai.org/aibox";' `
            -replace 'public const string AiControlImageRef = ".*?";', "public const string AiControlImageRef = `"${{ needs.build-ai-control.outputs.image_ref }}`";" `
            | Set-Content $cs

      - name: Install release pubkey resource
        shell: pwsh
        env:
          AIBOX_MANIFEST_PUBKEY_B64: ${{ secrets.AIBOX_MANIFEST_PUBKEY_B64 }}
          IS_TAG_BUILD: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if (-not $env:AIBOX_MANIFEST_PUBKEY_B64) {
            if ($env:IS_TAG_BUILD -eq 'true') {
              throw "AIBOX_MANIFEST_PUBKEY_B64 secret is missing on a tag build — refusing to ship a binary that cannot verify any signed manifest."
            }
            Write-Warning "AIBOX_MANIFEST_PUBKEY_B64 not set — using placeholder. Signature verification will fail at runtime."
          } else {
            Set-Content -Path "aibox/installer/first-run/Resources/release-pubkey.ed25519" -Value $env:AIBOX_MANIFEST_PUBKEY_B64 -NoNewline
          }

      - name: Publish First Run
        shell: pwsh
        run: |
          dotnet publish aibox/installer/first-run/AIBoxFirstRun.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            /p:Version=${{ steps.ver.outputs.version }} `
            -o dist/stage/first-run

      - name: Publish Uninstaller (alongside First Run)
        shell: pwsh
        run: |
          dotnet publish aibox/installer/uninstaller/AIBoxUninstaller.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            /p:Version=${{ steps.ver.outputs.version }} `
            -o dist/stage/first-run

      - name: Sign First Run + Uninstaller binaries
        if: ${{ env.AZURE_SIGNING_TENANT != '' }}
        shell: pwsh
        run: |
          # Azure Trusted Signing via signtool. See repo wiki for setup.
          & .github/workflows/sign-files.ps1 -Paths @(
            "dist/stage/first-run/AIBox First Run.exe",
            "dist/stage/first-run/AIBoxUninstaller.exe"
          )

      - uses: actions/upload-artifact@v4
        with:
          name: first-run-stage
          path: dist/stage/first-run/

  # ---------------------------------------------------------------------------
  # 3. Build the Inno Setup installer.
  # ---------------------------------------------------------------------------
  build-inno:
    name: Build Inno setup
    runs-on: windows-latest
    needs: [build-first-run]
    env:
      AZURE_SIGNING_TENANT: ${{ secrets.AZURE_SIGNING_TENANT }}
      AZURE_SIGNING_CLIENT_ID: ${{ secrets.AZURE_SIGNING_CLIENT_ID }}
      AZURE_SIGNING_CLIENT_SECRET: ${{ secrets.AZURE_SIGNING_CLIENT_SECRET }}
      AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
      AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
      AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: first-run-stage
          path: dist/stage/first-run

      - name: Stage release pin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/stage | Out-Null
          "${{ github.sha }}" | Out-File dist/stage/RELEASE_COMMIT.txt -Encoding utf8

      - name: Stage Docker Desktop installer
        shell: pwsh
        env:
          DOCKER_DESKTOP_URL: "https://desktop.docker.com/win/main/amd64/Docker%20Desktop%20Installer.exe"
          DOCKER_DESKTOP_SHA256: ${{ vars.DOCKER_DESKTOP_SHA256 }}
        run: |
          $dest = "dist/stage/DockerDesktopInstaller.exe"
          Invoke-WebRequest -Uri $env:DOCKER_DESKTOP_URL -OutFile $dest
          $hash = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($env:DOCKER_DESKTOP_SHA256 -and ($hash -ne $env:DOCKER_DESKTOP_SHA256.ToLowerInvariant())) {
            Write-Error "Docker Desktop SHA256 mismatch: expected $env:DOCKER_DESKTOP_SHA256, got $hash"
            exit 1
          }
          Write-Host "Docker Desktop SHA256: $hash"

      - name: Build NVIDIA probe
        shell: pwsh
        run: |
          dotnet publish aibox/installer/inno/nvidia-probe/nvidia-probe.csproj `
            -c Release -r win-x64 --self-contained false `
            -o dist/stage/nvidia-probe-staging
          Copy-Item dist/stage/nvidia-probe-staging/nvidia-probe.exe dist/stage/

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Locate iscc.exe
        id: iscc
        shell: pwsh
        run: |
          $iscc = Get-ChildItem 'C:\Program Files*\Inno Setup*\iscc.exe' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) { throw "iscc.exe not found after choco install innosetup" }
          "path=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF}" -like "refs/tags/v*") {
            $v = "${env:GITHUB_REF}".Substring(11)
          } else {
            $v = "0.0.0-dev.$(${env:GITHUB_SHA}.Substring(0, 7))"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Compile installer
        shell: pwsh
        run: |
          & '${{ steps.iscc.outputs.path }}' `
            /Dversion=${{ steps.ver.outputs.version }} `
            aibox/installer/inno/AIBox.iss

      - name: Sign installer
        if: ${{ env.AZURE_SIGNING_TENANT != '' }}
        shell: pwsh
        run: |
          & .github/workflows/sign-files.ps1 -Paths @(
            "dist/AIBox-Setup-${{ steps.ver.outputs.version }}.exe"
          )

      - name: Compute sha256
        shell: pwsh
        run: |
          $exe = "dist/AIBox-Setup-${{ steps.ver.outputs.version }}.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $exe)" | Out-File "$exe.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: |
            dist/AIBox-Setup-*.exe
            dist/AIBox-Setup-*.exe.sha256

  # ---------------------------------------------------------------------------
  # 4. Build and sign the release manifest. Inputs are resolved live so we
  #    pin to whatever HF and Kiwix have on release day.
  # ---------------------------------------------------------------------------
  build-manifest:
    name: Build + sign manifest
    runs-on: ubuntu-latest
    needs: [build-inno]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install cryptography requests pyyaml

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build manifest
        env:
          AIBOX_R2_BASE: ${{ vars.AIBOX_R2_BASE }}
        run: |
          python aibox/installer/build/build_manifest.py \
            --version "${{ steps.ver.outputs.version }}" \
            --output "dist/manifest-${{ steps.ver.outputs.version }}.json" \
            --compute-non-lfs-sha

      - name: Validate manifest signing secret
        shell: bash
        run: |
          if [ -z "${AIBOX_MANIFEST_PRIVKEY:-}" ]; then
            echo "::error::AIBOX_MANIFEST_PRIVKEY secret is not set"; exit 1
          fi
        env:
          AIBOX_MANIFEST_PRIVKEY: ${{ secrets.AIBOX_MANIFEST_PRIVKEY }}

      - name: Sign manifest
        env:
          AIBOX_MANIFEST_PRIVKEY: ${{ secrets.AIBOX_MANIFEST_PRIVKEY }}
        run: |
          python aibox/installer/build/sign-manifest.py \
            --manifest "dist/manifest-${{ steps.ver.outputs.version }}.json" \
            --sig-out "dist/manifest-${{ steps.ver.outputs.version }}.json.sig" \
            --key-base64-env AIBOX_MANIFEST_PRIVKEY

      - name: Verify manifest signature
        env:
          AIBOX_MANIFEST_PUBKEY_B64: ${{ secrets.AIBOX_MANIFEST_PUBKEY_B64 }}
        run: |
          python aibox/installer/build/verify-manifest.py \
            --manifest "dist/manifest-${{ steps.ver.outputs.version }}.json" \
            --sig "dist/manifest-${{ steps.ver.outputs.version }}.json.sig" \
            --pubkey-b64-env AIBOX_MANIFEST_PUBKEY_B64

      - uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: dist/manifest-*.json*

  # ---------------------------------------------------------------------------
  # 5. Mirror manifest to R2 (so both R2 and GitHub serve it) and bump
  #    /latest.json so live installers pick up the new release.
  # ---------------------------------------------------------------------------
  upload-r2:
    name: Mirror manifest to R2
    runs-on: ubuntu-latest
    needs: [build-manifest]
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: manifest
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install boto3 pyyaml

      - name: Validate R2 credentials
        run: |
          for v in AIBOX_R2_ACCOUNT_ID AIBOX_R2_ACCESS_KEY_ID AIBOX_R2_SECRET_ACCESS_KEY AIBOX_R2_BUCKET; do
            if [ -z "${!v:-}" ]; then
              echo "::error::$v is not set"; exit 1
            fi
          done
        env:
          AIBOX_R2_ACCOUNT_ID: ${{ secrets.AIBOX_R2_ACCOUNT_ID }}
          AIBOX_R2_ACCESS_KEY_ID: ${{ secrets.AIBOX_R2_ACCESS_KEY_ID }}
          AIBOX_R2_SECRET_ACCESS_KEY: ${{ secrets.AIBOX_R2_SECRET_ACCESS_KEY }}
          AIBOX_R2_BUCKET: ${{ vars.AIBOX_R2_BUCKET }}

      - name: Upload to R2
        env:
          AIBOX_R2_ACCOUNT_ID: ${{ secrets.AIBOX_R2_ACCOUNT_ID }}
          AIBOX_R2_ACCESS_KEY_ID: ${{ secrets.AIBOX_R2_ACCESS_KEY_ID }}
          AIBOX_R2_SECRET_ACCESS_KEY: ${{ secrets.AIBOX_R2_SECRET_ACCESS_KEY }}
          AIBOX_R2_BUCKET: ${{ vars.AIBOX_R2_BUCKET }}
        run: |
          # Resolve the actual manifest path before invoking Python — bash
          # globbing passes a literal "dist/manifest-*.json" string to argparse
          # if no files match, which fails with a confusing FileNotFoundError.
          manifest_json=$(ls dist/manifest-*.json 2>/dev/null | head -1)
          if [ -z "$manifest_json" ]; then
            echo "::error::No dist/manifest-*.json artifact found"; exit 1
          fi
          if [ ! -f "${manifest_json}.sig" ]; then
            echo "::error::Signature file ${manifest_json}.sig is missing"; exit 1
          fi
          python aibox/installer/build/stage_r2_content.py \
            --upload-manifest "$manifest_json" \
            --upload-manifest-sig "${manifest_json}.sig" \
            --update-latest

  # ---------------------------------------------------------------------------
  # 6. Publish GitHub release (last so dependents only see a release when
  #    every other artifact is in place).
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-inno, build-manifest, upload-r2]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      # Download each artifact by name into a flat dist/ — merge-multiple lays
      # them under dist/<artifact-name>/ instead, which breaks the flat globs
      # softprops/action-gh-release expects below.
      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: manifest
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AIBox-Setup-*.exe
            dist/AIBox-Setup-*.exe.sha256
            dist/manifest-*.json
            dist/manifest-*.json.sig
          generate_release_notes: true
          fail_on_unmatched_files: true
